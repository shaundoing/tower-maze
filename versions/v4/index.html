<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tower Maze – Physics Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas { display: block; }

    #floor-label {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.9);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: rgba(0,0,0,0.45);
      padding: 7px 18px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.12);
      pointer-events: none;
      white-space: nowrap;
    }

    #reset-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.8);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #reset-btn:active { background: rgba(255,255,255,0.25); }

    #tilt-btn {
      position: fixed;
      top: 52px;
      right: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 6px 11px;
      border-radius: 16px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #tilt-btn.active {
      background: rgba(100,200,100,0.2);
      border-color: rgba(100,200,100,0.5);
      color: #80e080;
    }

    #admin-btn {
      position: fixed;
      top: 92px;
      right: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.45);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 6px 11px;
      border-radius: 16px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #admin-btn.open {
      background: rgba(255,160,60,0.2);
      border-color: rgba(255,160,60,0.5);
      color: #ffaa66;
    }

    #admin-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(14,16,22,0.97);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 28px 24px 20px;
      width: min(300px, calc(100vw - 48px));
      display: none;
      z-index: 200;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    #admin-panel h2 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-align: center;
      margin-bottom: 24px;
    }
    .sens-row { margin-bottom: 20px; }
    .sens-row label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .sens-row label em {
      font-style: normal;
      font-size: 16px;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      min-width: 28px;
      text-align: right;
    }
    .sens-row input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.14);
      outline: none;
      cursor: pointer;
    }
    .sens-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.55);
    }
    .sens-row input[type=range]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      cursor: pointer;
    }
    #admin-done {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      color: rgba(255,255,255,0.6);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
    }
    #admin-done:active { background: rgba(255,255,255,0.18); }

    #map-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.8);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #map-btn:active { background: rgba(255,255,255,0.25); }
    #map-btn.open {
      background: rgba(80,160,255,0.2);
      border-color: rgba(80,160,255,0.55);
      color: #7ab8ff;
    }

    .rot-btn {
      position: fixed;
      bottom: 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.8);
      font-size: 20px;
      line-height: 1;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .rot-btn:active { background: rgba(255,255,255,0.25); }
    #rot-left-btn  { left: 12px; }
    #rot-right-btn { left: 64px; }

    #end-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    #end-screen h1 {
      font-size: 30px;
      font-weight: 200;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    #end-screen p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      margin-bottom: 36px;
    }
    #end-screen button {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      padding: 13px 30px;
      border-radius: 28px;
      cursor: pointer;
      touch-action: manipulation;
    }
    #end-screen button:active { background: rgba(255,255,255,0.25); }

    #death-screen, #title-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      z-index: 300;
    }
    #death-screen h1, #title-screen h1 {
      font-size: 30px;
      font-weight: 200;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    #death-screen h1 { color: #ff7a5c; }
    #death-screen p, #title-screen p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      margin-bottom: 36px;
    }
    #death-screen button, #title-screen button {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      padding: 13px 30px;
      border-radius: 28px;
      cursor: pointer;
      touch-action: manipulation;
      margin: 6px;
    }
    #death-screen button:active, #title-screen button:active { background: rgba(255,255,255,0.25); }
    .death-btns { display: flex; flex-wrap: wrap; justify-content: center; }

    #hint {
      position: fixed;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 1s;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="floor-label">Floor 1</div>
<button id="map-btn">MAP</button>
<button id="rot-left-btn"  class="rot-btn" title="Rotate view left (Q)">&#10226;</button>
<button id="rot-right-btn" class="rot-btn" title="Rotate view right (E)">&#10227;</button>
<button id="reset-btn">RESET</button>
<button id="tilt-btn">TILT: OFF</button>
<button id="admin-btn">SETTINGS</button>

<div id="admin-panel">
  <h2>Settings</h2>
  <div class="sens-row">
    <label>Joystick Sensitivity <em id="joy-sens-val">2.5</em></label>
    <input type="range" id="joy-sens-sl" min="0.3" max="3" step="0.1" value="2.5">
  </div>
  <div class="sens-row">
    <label>Tilt Sensitivity <em id="tilt-sens-val">2.8</em></label>
    <input type="range" id="tilt-sens-sl" min="0.5" max="5" step="0.1" value="2.8">
  </div>
  <div class="sens-row">
    <label>Bounce Sensitivity <em id="bounce-val">0.75</em></label>
    <input type="range" id="bounce-sl" min="0.1" max="1" step="0.05" value="0.75">
  </div>
  <div class="sens-row">
    <label>Sound Effect Volume <em id="sfx-val">1.0</em></label>
    <input type="range" id="sfx-sl" min="0" max="1" step="0.05" value="1">
  </div>
  <div class="sens-row">
    <label>Music Volume <em id="music-val">0.5</em></label>
    <input type="range" id="music-sl" min="0" max="1" step="0.05" value="0.5">
  </div>
  <button id="admin-done">Done</button>
</div>
<div id="hint">Arrow keys · Click &amp; drag · or enable Tilt</div>

<div id="end-screen">
  <h1>Tower Complete</h1>
  <p>You unlocked the sequence and escaped through the Floor 4 exit</p>
  <button id="play-again-btn">PLAY AGAIN</button>
</div>

<div id="death-screen">
  <h1 id="death-title">INTO THE VOID</h1>
  <p id="death-sub">A bottomless pit. Emphasis on bottomless.</p>
  <div class="death-btns">
    <button id="death-restart">RESTART FLOOR</button>
    <button id="death-newgame">NEW GAME</button>
    <button id="death-quit">QUIT</button>
  </div>
</div>

<div id="title-screen">
  <h1>Tower Maze</h1>
  <p>Roll. Solve. Descend.</p>
  <button id="title-play">PLAY</button>
</div>

<script>
'use strict';

// ================================================================
//  PHYSICS & GAME CONFIG  ← tune all the feel values here
// ================================================================
const CONFIG = {
  // Ball dynamics
  acceleration:         400,   // px/s²  – how quickly ball builds up speed from input
  maxSpeed:             900,   // px/s   – ball's terminal velocity
  friction:             0.99,  // 0–1    – velocity multiplier per frame (lower = stickier floor)
  wallBounce:           0.75,  // 0–1    – speed kept after bouncing off a wall (0=dead stop)

  // Controls
  joystickSensitivity:  2.5,   // 0–3    – scales joystick deflection → acceleration
  joystickRadius:       60,    // px     – cursor distance from anchor for full speed
  tiltSensitivity:      2.8,   // 0–5    – scales device tilt angle → acceleration
  keyboardSensitivity:  1.0,   // 0–2    – scales arrow key → acceleration

  // Pause / Anchor
  pauseBraking:         0.04,  // 0–1    – velocity multiplier per frame while paused
                               //          0 = instant stop, 0.85 = slow drift-to-stop

  // Geometry
  ballRadius:           16,    // px
  wallThickness:        24,    // px
  holeRadius:           26,    // px  – must be larger than ballRadius
  doorWidth:            90,    // px  – height of the door gap in the perimeter wall

  // Camera
  cameraSmoothing:      9,     // higher = snappier follow (units: 1/s)

  // ── Grid ─────────────────────────────────────────────────────
  tileSize:             70,    // px  – play area square size (drives the grid)
  gridLineOpacity:      0.5,  // 0–1 – grid line alpha; raise to make grid more visible
  gridLineThickness:    1,     // px  – grid stroke width
  gridLineColor:        '210,200,175', // RGB for rgba() – warm stone tone

  // ── Platform (Floor 1 test area) ─────────────────────────────
  platformHeight:                35,   // px  – visual elevation depth (drives shadow/face thickness)

  // ── Isometric view ───────────────────────────────────────────
  wallHeight:           42,    // px  – vertical height of walls in iso view
  viewRotateSpeed:      7,     // 1/s – how snappily the camera swings to a new 90° heading

  // ── Collision sound & bounce effect ──────────────────────────
  bounceMinSpeed:       30,    // px/s – minimum impact speed to fire sound/effect
  bounceVolume:         0.40,  // 0–1  – collision sound master volume

  // ── Audio mix ────────────────────────────────────────────────
  sfxVolume:            1.0,   // 0–1  – master multiplier for all sound effects
  musicVolume:          0.5,   // 0–1  – music level (music itself arrives in a later version)

  // ── Debug ────────────────────────────────────────────────────
  showSurfaceDebug:     true,  // show surface-type label while testing
};
// ================================================================

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

let W = 0, H = 0;  // viewport size (updated on resize)
let floors = [];
let gs     = null; // game state
let lastTime = null;

// ── Audio ────────────────────────────────────────────────────────
let audioCtx      = null;
let lastBounceAt  = 0;  // ms timestamp, throttles rapid-fire sounds

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBounceSound(impactSpeed) {
  try {
    const ac  = getAudioCtx();
    if (ac.state === 'suspended') ac.resume();
    const t   = ac.currentTime;
    const vol = Math.min(1, impactSpeed / 400) * CONFIG.bounceVolume * CONFIG.sfxVolume;

    // Tonal body — pitch drops quickly (physical "thud")
    const osc     = ac.createOscillator();
    const oscGain = ac.createGain();
    osc.connect(oscGain);
    oscGain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(240 + impactSpeed * 0.18, t);
    osc.frequency.exponentialRampToValueAtTime(70, t + 0.14);
    oscGain.gain.setValueAtTime(vol * 0.9, t);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    osc.start(t);
    osc.stop(t + 0.18);

    // Sharp transient click (attack definition)
    const click     = ac.createOscillator();
    const clickGain = ac.createGain();
    click.connect(clickGain);
    clickGain.connect(ac.destination);
    click.type = 'square';
    click.frequency.setValueAtTime(900, t);
    clickGain.gain.setValueAtTime(vol * 0.12, t);
    clickGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.018);
    click.start(t);
    click.stop(t + 0.018);
  } catch (_) {}
}

function playTriggerSound(step) {
  // Rising chime — pitch climbs with each trigger collected (step = 1, 2, 3 …)
  try {
    const ac = getAudioCtx();
    if (ac.state === 'suspended') ac.resume();
    const t    = ac.currentTime;
    const freq = 520 * Math.pow(2, (step - 1) * 4 / 12); // up a major 3rd per step
    const osc  = ac.createOscillator();
    const g    = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.30 * CONFIG.sfxVolume, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
    osc.start(t); osc.stop(t + 0.45);
  } catch (_) {}
}

function playUnlockSound() {
  // Two-note resolve chord — "the way is open"
  try {
    const ac = getAudioCtx();
    if (ac.state === 'suspended') ac.resume();
    const t = ac.currentTime;
    [[523.25, 0], [783.99, 0.09]].forEach(([f, dly]) => {
      const osc = ac.createOscillator();
      const g   = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(f, t + dly);
      g.gain.setValueAtTime(0.0001, t + dly);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0001, 0.26 * CONFIG.sfxVolume), t + dly + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dly + 0.7);
      osc.start(t + dly); osc.stop(t + dly + 0.7);
    });
  } catch (_) {}
}

function playErrorSound() {
  // Low dissonant buzz — wrong sequence, progress reset
  try {
    const ac = getAudioCtx();
    if (ac.state === 'suspended') ac.resume();
    const t = ac.currentTime;
    [110, 116.5].forEach(f => {
      const osc = ac.createOscillator();
      const g   = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.10 * CONFIG.sfxVolume, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    });
  } catch (_) {}
}

// ── Bounce visual effects ────────────────────────────────────────
const bounceEffects = [];

function onBounce(contactX, contactY, impactSpeed) {
  if (impactSpeed < CONFIG.bounceMinSpeed) return;

  // Visual ring — always spawned (doesn't need throttle)
  bounceEffects.push({ x: contactX, y: contactY, life: 1.0, speed: impactSpeed });

  // Sound — throttled so rapid wall-sliding doesn't spam
  const now = performance.now();
  if (now - lastBounceAt > 75) {
    lastBounceAt = now;
    playBounceSound(impactSpeed);
  }
}

function updateBounceEffects(dt) {
  for (let i = bounceEffects.length - 1; i >= 0; i--) {
    bounceEffects[i].life -= dt * 6.5;   // ~0.15 s lifetime
    if (bounceEffects[i].life <= 0) bounceEffects.splice(i, 1);
  }
}

function drawBounceEffects() {
  for (const ef of bounceEffects) {
    const p    = isoProject(ef.x, ef.y, 0);
    const age  = 1 - ef.life;                          // 0→1
    const r    = CONFIG.ballRadius * (1 + age * 2.8);  // expanding ring
    const lw   = 2.5 * ef.life;
    const alpha = ef.life * 0.8;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, r, r * ISO_Y, 0, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,220,${alpha.toFixed(3)})`;
    ctx.lineWidth   = lw;
    ctx.stroke();
  }
}

// ── Floor data ──────────────────────────────────────────────────
function deviceClass() {
  const touch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (!touch) return 'desktop';
  return Math.min(window.innerWidth, window.innerHeight) >= 600 ? 'tablet' : 'phone';
}

function buildFloors() {
  // Phones get a long scrolling floor; tablets (and desktop) see most of it at once
  const dc = deviceClass();
  const fw = Math.round(W * (dc === 'phone' ? 4   : 1.5));
  const fh = Math.round(H * (dc === 'phone' ? 2.5 : 1.5));
  const wt = CONFIG.wallThickness;
  const r  = CONFIG.ballRadius;
  const ts = CONFIG.tileSize;

  // Helper: proportional point
  const P = (px, py) => ({ x: Math.round(fw * px), y: Math.round(fh * py) });

  floors = [
    // ── Floor 1 — simple: find the hole ─────────────────────────
    {
      index:  0,
      label:  'Floor 1',
      width:  fw,
      height: fh,
      bgColor:        '#3d3a2d',
      tileColor:      '#464237',
      tileLineColor:  'rgba(0,0,0,0.09)',
      wallColor:      '#7d7254',
      wallHighlight:  '#b0a072',
      wallShadow:     '#2e2b1e',
      wallAO:         'rgba(0,0,0,0.28)',
      hole: { ...P(0.58, 0.42), r: CONFIG.holeRadius },
      door: null,
      triggers: [],
      requireSequence: false,
      startX: wt + r + 30,
      startY: wt + r + 30,
      platformStructures: [{ x: wt + 2 * ts, y: wt + 2 * ts, w: 3 * ts, h: 3 * ts }],
      innerWalls: [],
    },
    // ── Floor 2 — one trigger unlocks the hole ──────────────────
    {
      index:  1,
      label:  'Floor 2',
      width:  fw,
      height: fh,
      bgColor:        '#2a2d36',
      tileColor:      '#31353f',
      tileLineColor:  'rgba(0,0,0,0.12)',
      wallColor:      '#52596e',
      wallHighlight:  '#7888aa',
      wallShadow:     '#191c24',
      wallAO:         'rgba(0,0,0,0.32)',
      hole: { ...P(0.86, 0.18), r: CONFIG.holeRadius },
      door: null,
      triggers: [ { id: 'f2-t1', ...P(0.14, 0.78), r: 30 } ],
      requireSequence: false,
      startX: 0, startY: 0,  // set below (floor 1 hole)
      platformStructures: [],
      innerWalls: [
        // Vertical baffle: forces a detour around the bottom
        { x: Math.round(fw * 0.38), y: wt, w: wt, h: Math.round(fh * 0.62) },
        // Horizontal baffle near the hole corner
        { x: Math.round(fw * 0.66), y: Math.round(fh * 0.40), w: Math.round(fw * 0.34) - wt, h: wt },
      ],
    },
    // ── Floor 3 — two triggers, any order ────────────────────────
    {
      index:  2,
      label:  'Floor 3',
      width:  fw,
      height: fh,
      bgColor:        '#26332b',
      tileColor:      '#2d3b32',
      tileLineColor:  'rgba(0,0,0,0.12)',
      wallColor:      '#4e6a58',
      wallHighlight:  '#7da88a',
      wallShadow:     '#16211a',
      wallAO:         'rgba(0,0,0,0.32)',
      hole: { ...P(0.10, 0.15), r: CONFIG.holeRadius },
      door: null,
      triggers: [
        { id: 'f3-t1', ...P(0.13, 0.80), r: 30 },
        { id: 'f3-t2', ...P(0.88, 0.75), r: 30 },
      ],
      requireSequence: false,
      startX: 0, startY: 0,  // set below (floor 2 hole)
      platformStructures: [],
      innerWalls: [
        // Horizontal shelf guarding the exit hole's quadrant
        { x: wt, y: Math.round(fh * 0.33), w: Math.round(fw * 0.30), h: wt },
        // Vertical baffle mid-floor
        { x: Math.round(fw * 0.55), y: Math.round(fh * 0.38), w: wt, h: Math.round(fh * 0.62) - wt },
      ],
    },
    // ── Floor 4 — three triggers in sequence unlock exit door ────
    {
      index:  3,
      label:  'Floor 4',
      width:  fw,
      height: fh,
      bgColor:        '#332629',
      tileColor:      '#3b2d31',
      tileLineColor:  'rgba(0,0,0,0.12)',
      wallColor:      '#6a4e55',
      wallHighlight:  '#a87d88',
      wallShadow:     '#21161a',
      wallAO:         'rgba(0,0,0,0.32)',
      hole: null,
      door: { wall: 'right', center: Math.round(fh * 0.50), width: CONFIG.doorWidth },
      triggers: [
        { id: 'f4-t1', order: 0, ...P(0.78, 0.18), r: 30 },
        { id: 'f4-t2', order: 1, ...P(0.18, 0.82), r: 30 },
        { id: 'f4-t3', order: 2, ...P(0.55, 0.50), r: 30 },
      ],
      requireSequence: true,
      startX: 0, startY: 0,  // set below (floor 3 hole)
      platformStructures: [],
      innerWalls: [
        // Diagonal-ish layout of baffles around the centre pad
        { x: Math.round(fw * 0.40), y: wt, w: wt, h: Math.round(fh * 0.40) },
        { x: Math.round(fw * 0.40), y: Math.round(fh * 0.65), w: Math.round(fw * 0.35), h: wt },
        { x: Math.round(fw * 0.70), y: Math.round(fh * 0.30), w: wt, h: Math.round(fh * 0.35) },
      ],
    },
  ];

  // Each floor spawns the ball where it fell through the hole above
  for (let i = 1; i < floors.length; i++) {
    const above = floors[i - 1];
    if (above.hole) {
      floors[i].startX = above.hole.x;
      floors[i].startY = above.hole.y;
    }
  }

  // ── Surface tiles & moving platforms ──────────────────────────
  for (const f of floors) { f.tiles = {}; f.movers = []; }

  // Floor 1 — teaching patches: feel mud and ice with no danger
  paintTiles(floors[0], 0.30, 0.58, 0.12, 0.20, 'mud');
  paintTiles(floors[0], 0.46, 0.18, 0.15, 0.20, 'ice');

  // Floor 2 — ice run on the southern route, mud chicane, lava pocket
  paintTiles(floors[1], 0.42, 0.70, 0.22, 0.14, 'ice');
  paintTiles(floors[1], 0.52, 0.25, 0.10, 0.28, 'mud');
  paintTiles(floors[1], 0.72, 0.78, 0.09, 0.12, 'lava');

  // Floor 3 — pit channel crossed by a moving platform, lava shelf
  paintTiles(floors[2], 0.30, 0.40, 0.07, 0.60, 'pit');
  paintTiles(floors[2], 0.62, 0.12, 0.13, 0.14, 'lava');
  floors[2].movers.push(mkMover(floors[2], 0.265, 0.62, 0.40, 0.62, 2.2));

  // Floor 4 — pit moat before the exit, icy approach, mud trap
  paintTiles(floors[3], 0.84, 0.28, 0.07, 0.44, 'pit');
  paintTiles(floors[3], 0.55, 0.12, 0.18, 0.10, 'ice');
  paintTiles(floors[3], 0.12, 0.55, 0.12, 0.14, 'mud');
  floors[3].movers.push(mkMover(floors[3], 0.805, 0.50, 0.945, 0.50, 2.6));
}

// Paint a proportional rect of the floor with a tile type (snapped to the grid)
function paintTiles(floor, px, py, pw, ph, type) {
  const ts = CONFIG.tileSize;
  const c0 = Math.round(floor.width  * px / ts);
  const r0 = Math.round(floor.height * py / ts);
  const c1 = Math.max(c0 + 1, Math.round(floor.width  * (px + pw) / ts));
  const r1 = Math.max(r0 + 1, Math.round(floor.height * (py + ph) / ts));
  for (let c = c0; c < c1; c++)
    for (let r = r0; r < r1; r++)
      floor.tiles[c + ',' + r] = type;
}

// Moving platform that ping-pongs between two proportional points
function mkMover(floor, px1, py1, px2, py2, period) {
  const s = CONFIG.tileSize * 1.6;
  return {
    x1: floor.width * px1 - s / 2, y1: floor.height * py1 - s / 2,
    x2: floor.width * px2 - s / 2, y2: floor.height * py2 - s / 2,
    w: s, h: s, period,
    cx: floor.width * px1 - s / 2, cy: floor.height * py1 - s / 2,
    dx: 0, dy: 0,
  };
}

function tileTypeAt(floor, x, y) {
  if (!floor.tiles) return 'normal';
  const ts = CONFIG.tileSize;
  return floor.tiles[Math.floor(x / ts) + ',' + Math.floor(y / ts)] || 'normal';
}

function moverPos(m, time) {
  const t = (time / m.period) % 2;
  const k = t < 1 ? t : 2 - t;            // ping-pong 0..1
  const e = k * k * (3 - 2 * k);          // smoothstep easing at the ends
  return { x: m.x1 + (m.x2 - m.x1) * e, y: m.y1 + (m.y2 - m.y1) * e };
}

function updateMovers(floor, dt) {
  gs.time += dt;
  for (const m of (floor.movers || [])) {
    const p = moverPos(m, gs.time);
    m.dx = p.x - m.cx;
    m.dy = p.y - m.cy;
    m.cx = p.x;
    m.cy = p.y;
  }
}

function moverUnder(floor, ball) {
  for (const m of (floor.movers || [])) {
    if (ball.x >= m.cx && ball.x <= m.cx + m.w &&
        ball.y >= m.cy && ball.y <= m.cy + m.h) return m;
  }
  return null;
}

// ── Death (lava / pits) ──────────────────────────────────────────
const deathFx = [];   // screen-space flame particles

function startDeath(type) {
  if (gs.dying) return;
  gs.dying = { type, t: 0, x: gs.ball.x, y: gs.ball.y, shown: false };
  gs.ball.vx = 0;
  gs.ball.vy = 0;
  playDeathSound(type);
  if (type === 'lava') spawnFlameBurst();
}

function spawnFlameBurst() {
  const p = isoProject(gs.ball.x, gs.ball.y, 0);
  for (let i = 0; i < 30; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 30 + Math.random() * 140;
    deathFx.push({
      x: p.x, y: p.y - 8,
      vx: Math.cos(ang) * spd * 0.7,
      vy: -Math.abs(Math.sin(ang)) * spd - 40,   // flames rise
      r: 3 + Math.random() * 5,
      life: 0.5 + Math.random() * 0.6,
      maxLife: 1,
    });
  }
  for (const fx of deathFx) fx.maxLife = fx.life;
}

function updateDeathFx(dt) {
  for (let i = deathFx.length - 1; i >= 0; i--) {
    const fx = deathFx[i];
    fx.life -= dt;
    if (fx.life <= 0) { deathFx.splice(i, 1); continue; }
    fx.x += fx.vx * dt;
    fx.y += fx.vy * dt;
    fx.vy -= 30 * dt;   // updraft
  }
}

function drawDeathFx() {
  for (const fx of deathFx) {
    const k = fx.life / fx.maxLife;   // 1 → 0
    ctx.beginPath();
    ctx.arc(fx.x, fx.y, fx.r * (0.4 + k * 0.6), 0, Math.PI * 2);
    ctx.fillStyle = k > 0.55
      ? `rgba(255,${Math.round(140 + k * 90)},40,${(k * 0.95).toFixed(3)})`
      : `rgba(${Math.round(90 + k * 160)},${Math.round(30 + k * 60)},20,${(k * 0.9).toFixed(3)})`;
    ctx.fill();
  }
}

function updateDeath(dt) {
  if (!gs.dying) return;
  gs.dying.t += dt;
  if (gs.dying.t > 1.25 && !gs.dying.shown) {
    gs.dying.shown = true;
    const lava = gs.dying.type === 'lava';
    document.getElementById('death-title').textContent = lava ? 'BURNED TO ASH' : 'INTO THE VOID';
    document.getElementById('death-sub').textContent   = lava
      ? 'The lava claims another marble.'
      : 'A bottomless pit. Emphasis on bottomless.';
    document.getElementById('death-screen').style.display = 'flex';
  }
}

function hideDeathUI() {
  document.getElementById('death-screen').style.display = 'none';
  deathFx.length = 0;
}

function restartFloor() {
  const fi = gs.floor, f = floors[fi];
  gs.activated[fi] = {};
  gs.inside[fi]    = {};
  if (f.requireSequence) gs.seqProgress = 0;
  gs.ball.x = f.startX; gs.ball.y = f.startY;
  gs.ball.vx = 0; gs.ball.vy = 0; gs.ball.z = 0;
  gs.dying = null;
  hideDeathUI();
  snapCamera();
  updateFloorLabel();
}

function playDeathSound(type) {
  try {
    const ac = getAudioCtx();
    if (ac.state === 'suspended') ac.resume();
    const t = ac.currentTime, v = CONFIG.sfxVolume;
    if (type === 'pit') {
      // Long falling whistle
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(340, t);
      osc.frequency.exponentialRampToValueAtTime(38, t + 1.1);
      g.gain.setValueAtTime(0.30 * v, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 1.1);
      osc.start(t); osc.stop(t + 1.1);
    } else {
      // Lava: filtered noise burst + low rumble
      const len = Math.floor(ac.sampleRate * 0.6);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.6);
      const src = ac.createBufferSource(); src.buffer = buf;
      const flt = ac.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 900;
      const g = ac.createGain();
      src.connect(flt); flt.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(0.5 * v, t);
      src.start(t);
      const osc = ac.createOscillator(), g2 = ac.createGain();
      osc.connect(g2); g2.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(70, t);
      g2.gain.setValueAtTime(0.22 * v, t);
      g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
      osc.start(t); osc.stop(t + 0.7);
    }
  } catch (_) {}
}

// ── Isometric projection ─────────────────────────────────────────
// World stays a flat x/y plane; rendering projects through a 2:1 iso
// camera that can rotate in 90° snaps around the view focus.
const ISO_Y = 0.5;   // vertical squash of the ground plane

function viewAngle() { return gs ? gs.viewAngle : 0; }

function isoProject(wx, wy, wz = 0) {
  const a  = viewAngle();
  const ca = Math.cos(a), sa = Math.sin(a);
  const dx = wx - gs.camera.x, dy = wy - gs.camera.y;
  const rx = dx * ca - dy * sa;
  const ry = dx * sa + dy * ca;
  return {
    x: W / 2 + (rx - ry),
    y: H / 2 + (rx + ry) * ISO_Y - wz,
  };
}

// Painter's-algorithm sort key: larger = nearer the viewer
function isoDepth(wx, wy) {
  const a  = viewAngle();
  const ca = Math.cos(a), sa = Math.sin(a);
  return (wx * ca - wy * sa) + (wx * sa + wy * ca);
}

// Convert a screen-space input direction (joystick/tilt/keys) into a
// world-space direction of the same magnitude, honouring view rotation.
function screenDirToWorld(ix, iy) {
  const mag = Math.hypot(ix, iy);
  if (mag === 0) return [0, 0];
  const rx = ix / 2 + iy;       // invert sx = rx − ry, sy = (rx + ry)·ISO_Y
  const ry = iy - ix / 2;
  const a  = viewAngle();
  const ca = Math.cos(a), sa = Math.sin(a);
  const wx =  rx * ca + ry * sa;
  const wy = -rx * sa + ry * ca;
  const wmag = Math.hypot(wx, wy) || 1;
  return [wx / wmag * mag, wy / wmag * mag];
}

function rotateView(dir) {
  if (!gs || gs.ended) return;
  gs.viewTarget += dir;
}

function updateView(dt) {
  const target = gs.viewTarget * Math.PI / 2;
  const t = 1 - Math.exp(-CONFIG.viewRotateSpeed * dt);
  gs.viewAngle += (target - gs.viewAngle) * t;
  if (Math.abs(target - gs.viewAngle) < 0.0005) gs.viewAngle = target;
}

// ── Surface Detection ────────────────────────────────────────────
function getSurfaceType(ball, floor) {
  for (const ps of (floor.platformStructures || [])) {
    if (ball.x >= ps.x && ball.x < ps.x + ps.w &&
        ball.y >= ps.y && ball.y < ps.y + ps.h) return 'platform';
  }
  return 'floor';
}

// ── Trigger puzzle logic ─────────────────────────────────────────
function exitUnlocked(fi) {
  const f = floors[fi];
  if (!f.triggers || f.triggers.length === 0) return true;
  if (f.requireSequence) return gs.seqProgress >= f.triggers.length;
  return f.triggers.every(t => gs.activated[fi][t.id]);
}

function activatedCount(fi) {
  const f = floors[fi];
  return f.triggers.filter(t => gs.activated[fi][t.id]).length;
}

function fireTrigger(fi, trig) {
  const f   = floors[fi];
  const act = gs.activated[fi];
  if (act[trig.id]) return;  // already lit

  if (f.requireSequence) {
    if (trig.order === gs.seqProgress) {
      act[trig.id] = true;
      gs.seqProgress++;
      playTriggerSound(gs.seqProgress);
      if (exitUnlocked(fi)) playUnlockSound();
    } else {
      // Wrong order — everything resets
      for (const t of f.triggers) act[t.id] = false;
      gs.seqProgress = 0;
      playErrorSound();
    }
  } else {
    act[trig.id] = true;
    playTriggerSound(activatedCount(fi));
    if (exitUnlocked(fi)) playUnlockSound();
  }
  updateFloorLabel();
}

function updateTriggers() {
  const fi    = gs.floor;
  const floor = floors[fi];
  if (!floor.triggers || !floor.triggers.length) return;
  const ball = gs.ball;
  for (const t of floor.triggers) {
    const over = Math.hypot(ball.x - t.x, ball.y - t.y) < t.r;
    const was  = gs.inside[fi][t.id];
    if (over && !was) fireTrigger(fi, t);   // fire on enter edge only
    gs.inside[fi][t.id] = over;             // must roll off before it can fire again
  }
}

// ── Game state ───────────────────────────────────────────────────
function createGS() {
  const f = floors[0];
  return {
    floor:         0,
    ball:          { x: f.startX, y: f.startY, vx: 0, vy: 0, z: 0 },
    camera:        { x: f.startX, y: f.startY },   // world-space view focus
    viewTarget:    0,      // quarter-turn count (unbounded; ×90° = heading)
    viewAngle:     0,      // current animated heading in radians
    paused:        false,
    mapOpen:       false,
    mapAlpha:      0,
    transitioning: false,
    transAlpha:    0,      // 0=clear, 1=black
    transDir:      1,      // 1=fade-out, -1=fade-in
    ended:         false,
    endFade:       0,
    surface:       'floor',
    time:          0,      // world clock (drives moving platforms, lava glow)
    dying:         null,   // { type, t, x, y, shown } during a death animation
    // Trigger puzzle state (survives buildFloors() on resize — keyed by stable ids)
    activated:     floors.map(() => ({})),  // per-floor { triggerId: true }
    inside:        floors.map(() => ({})),  // per-floor { triggerId: true } — ball overlap, for enter-edge detection
    seqProgress:   0,                       // floor 4: how many sequence triggers hit in order
  };
}

function resetGame() {
  buildFloors();
  gs = createGS();
  snapCamera();
  updateFloorLabel();
  hideDeathUI();
  document.getElementById('end-screen').style.display = 'none';
  const mapBtn = document.getElementById('map-btn');
  mapBtn.textContent = 'MAP';
  mapBtn.classList.remove('open');
  lastTime = null;
  hideHint();
}

// ── Input ────────────────────────────────────────────────────────
const keys = { ArrowLeft:false, ArrowRight:false, ArrowUp:false, ArrowDown:false };

const joy = {
  active:  false,
  touchId: null,
  baseX:   0,
  baseY:   0,
  dx:      0,   // -1 to 1
  dy:      0,
};

// Pause button display geometry
const PAUSE_GFX = { cx:0, cy:0, r:32 };

function resizeControls() {
  PAUSE_GFX.cx = W - PAUSE_GFX.r - 24;
  PAUSE_GFX.cy = H - PAUSE_GFX.r - 56;
}

function setJoystickFromPos(tx, ty) {
  const dx  = tx - joy.baseX;
  const dy  = ty - joy.baseY;
  const len = Math.hypot(dx, dy);
  const max = CONFIG.joystickRadius;
  if (len < 6) { joy.dx = 0; joy.dy = 0; return; }
  const clamped = Math.min(len, max);
  joy.dx = (dx / len) * (clamped / max);
  joy.dy = (dy / len) * (clamped / max);
}

// Two-finger twist — rotates the iso view in 90° snaps
const twist = { active: false, lastAngle: 0, accum: 0 };
function touchPairAngle(touches) {
  return Math.atan2(touches[1].clientY - touches[0].clientY,
                    touches[1].clientX - touches[0].clientX);
}

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  hideHint();

  // A second finger starts a twist gesture and cancels the joystick
  if (e.touches.length === 2) {
    twist.active    = true;
    twist.lastAngle = touchPairAngle(e.touches);
    twist.accum     = 0;
    joy.active = false; joy.touchId = null; joy.dx = 0; joy.dy = 0;
    return;
  }

  for (const t of e.changedTouches) {
    const tx = t.clientX, ty = t.clientY;

    // Pause button hit test
    if (Math.hypot(tx - PAUSE_GFX.cx, ty - PAUSE_GFX.cy) < PAUSE_GFX.r + 12) {
      if (gs) gs.paused = !gs.paused;
      continue;
    }

    // Any non-pause touch becomes the joystick anchor
    if (!joy.active && !twist.active) {
      joy.active  = true;
      joy.touchId = t.identifier;
      joy.baseX   = tx;
      joy.baseY   = ty;
      joy.dx      = 0;
      joy.dy      = 0;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (twist.active && e.touches.length >= 2) {
    const ang  = touchPairAngle(e.touches);
    let delta  = ang - twist.lastAngle;
    if (delta >  Math.PI) delta -= Math.PI * 2;
    if (delta < -Math.PI) delta += Math.PI * 2;
    twist.lastAngle = ang;
    twist.accum    += delta;
    const STEP = 0.55;     // rad of finger twist per 90° view snap
    while (twist.accum >  STEP) { rotateView(1);  twist.accum -= STEP; }
    while (twist.accum < -STEP) { rotateView(-1); twist.accum += STEP; }
    return;
  }
  for (const t of e.changedTouches) {
    if (t.identifier === joy.touchId) setJoystickFromPos(t.clientX, t.clientY);
  }
}, { passive: false });

function touchEndHandler(e) {
  e.preventDefault();
  if (e.touches.length < 2) twist.active = false;
  for (const t of e.changedTouches) {
    if (t.identifier === joy.touchId) {
      joy.active = false; joy.touchId = null; joy.dx = 0; joy.dy = 0;
    }
  }
}
canvas.addEventListener('touchend',    touchEndHandler, { passive: false });
canvas.addEventListener('touchcancel', touchEndHandler, { passive: false });

// Mouse (desktop)
let mouseDragging = false;
canvas.addEventListener('mousedown', e => {
  hideHint();
  const mx = e.clientX, my = e.clientY;
  if (Math.hypot(mx - PAUSE_GFX.cx, my - PAUSE_GFX.cy) < PAUSE_GFX.r + 12) {
    if (gs) gs.paused = !gs.paused;
    return;
  }
  // Set anchor at click position — VS-style
  mouseDragging = true;
  joy.active    = true;
  joy.baseX     = mx;
  joy.baseY     = my;
  joy.dx        = 0;
  joy.dy        = 0;
});
window.addEventListener('mousemove', e => {
  if (mouseDragging) setJoystickFromPos(e.clientX, e.clientY);
});
window.addEventListener('mouseup', () => {
  mouseDragging = false;
  joy.active = false;
  joy.dx = 0;
  joy.dy = 0;
});

// Keyboard
window.addEventListener('keydown', e => {
  if (e.key in keys) { keys[e.key] = true; hideHint(); }
  if (e.key === ' ')                   { if (gs) gs.paused = !gs.paused; }
  if (e.key === 'r' || e.key === 'R')  resetGame();
  if (e.key === 'q' || e.key === 'Q')  rotateView(-1);
  if (e.key === 'e' || e.key === 'E')  rotateView(1);
});
window.addEventListener('keyup', e => {
  if (e.key in keys) keys[e.key] = false;
});

// Device tilt
const tilt = { enabled: false, x: 0, y: 0, betaOffset: null, usingMotion: false };

// Small debug overlay — visible while tilt is on so sensor state is always readable
const tiltDbg = { el: null };
function showTiltDebug(text) {
  if (!tiltDbg.el) {
    tiltDbg.el = document.createElement('div');
    Object.assign(tiltDbg.el.style, {
      position: 'fixed', bottom: '8px', right: '8px',
      background: 'rgba(0,0,0,0.65)', color: 'rgba(255,255,255,0.65)',
      fontFamily: 'monospace', fontSize: '10px',
      padding: '4px 8px', borderRadius: '8px',
      pointerEvents: 'none', zIndex: '999', whiteSpace: 'nowrap',
    });
    document.body.appendChild(tiltDbg.el);
  }
  tiltDbg.el.textContent = text;
}
function hideTiltDebug() {
  if (tiltDbg.el) { tiltDbg.el.remove(); tiltDbg.el = null; }
}

function applyScreenAngle(rawGammaOrX, rawBetaOrY) {
  const angle = screen.orientation?.angle ?? window.orientation ?? 0;
  if (angle === 90)                        return [  rawBetaOrY, -rawGammaOrX ];
  if (angle === -90 || angle === 270)      return [ -rawBetaOrY,  rawGammaOrX ];
  if (Math.abs(angle) === 180)             return [ -rawGammaOrX, -rawBetaOrY ];
  return [ rawGammaOrX, rawBetaOrY ];
}

function onOrientation(e) {
  // Null values mean no gyroscope — fall back to accelerometer
  if (e.gamma === null && e.beta === null) {
    window.removeEventListener('deviceorientation', onOrientation);
    window.addEventListener('devicemotion', onMotion, { passive: true });
    tilt.usingMotion = true;
    showTiltDebug('no gyro — trying accelerometer…');
    return;
  }

  const [rawX, rawY] = applyScreenAngle(e.gamma || 0, e.beta || 0);
  if (tilt.betaOffset === null) tilt.betaOffset = rawY;

  const MAX_ANGLE = 28;
  tilt.x = Math.max(-1, Math.min(1,  rawX / MAX_ANGLE));
  tilt.y = Math.max(-1, Math.min(1, (rawY - tilt.betaOffset) / MAX_ANGLE));

  const g = (e.gamma || 0).toFixed(0), b = (e.beta || 0).toFixed(0);
  showTiltDebug(`gyro γ${g} β${b} → ${tilt.x.toFixed(2)}, ${tilt.y.toFixed(2)}`);
}

function onMotion(e) {
  const acc = e.accelerationIncludingGravity;
  if (!acc || acc.x === null) { showTiltDebug('NO SENSOR DATA'); return; }

  // Gravity vector gives tilt angle: sin(θ) ≈ a / g
  const [rawX, rawY] = applyScreenAngle(
    ( acc.x || 0) / 9.81,
    (-acc.y || 0) / 9.81   // y axis is inverted vs gamma convention
  );

  if (tilt.betaOffset === null) tilt.betaOffset = rawY;
  tilt.x = Math.max(-1, Math.min(1, rawX));
  tilt.y = Math.max(-1, Math.min(1, rawY - tilt.betaOffset));

  showTiltDebug(`accel x${(acc.x||0).toFixed(1)} y${(acc.y||0).toFixed(1)} → ${tilt.x.toFixed(2)}, ${tilt.y.toFixed(2)}`);
}

function enableTilt() {
  const btn = document.getElementById('tilt-btn');
  if (tilt.enabled) {
    tilt.enabled = false;
    tilt.usingMotion = false;
    btn.textContent = 'TILT: OFF';
    btn.classList.remove('active');
    window.removeEventListener('deviceorientation', onOrientation);
    window.removeEventListener('devicemotion', onMotion);
    hideTiltDebug();
    return;
  }
  function startListening() {
    tilt.enabled    = true;
    tilt.usingMotion = false;
    tilt.betaOffset = null;
    btn.textContent = 'TILT: ON';
    btn.classList.add('active');
    showTiltDebug('waiting for sensor…');
    window.addEventListener('deviceorientation', onOrientation);
  }
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(s => { if (s === 'granted') startListening(); });
  } else {
    startListening();
  }
}

// Re-calibrate when screen rotates
window.addEventListener('orientationchange', () => { if (tilt.enabled) tilt.betaOffset = null; });
if (screen.orientation) {
  screen.orientation.addEventListener('change', () => { if (tilt.enabled) tilt.betaOffset = null; });
}

// ── Physics ──────────────────────────────────────────────────────
function updatePhysics(dt) {
  if (!gs || gs.transitioning || gs.ended || gs.dying) return;

  const ball  = gs.ball;
  const floor = floors[gs.floor];
  const wt    = CONFIG.wallThickness;
  const r     = CONFIG.ballRadius;

  // Surface detection (always current, even while paused)
  gs.surface = getSurfaceType(ball, floor);

  if (gs.paused || gs.mapOpen) {
    // Anchor: brake the ball
    ball.vx *= CONFIG.pauseBraking;
    ball.vy *= CONFIG.pauseBraking;
    if (Math.abs(ball.vx) < 0.5) ball.vx = 0;
    if (Math.abs(ball.vy) < 0.5) ball.vy = 0;
    return;
  }

  // ── Gather input — analog inputs scale with deflection/tilt magnitude
  let ax = 0, ay = 0;

  if (joy.active) {
    ax += joy.dx * CONFIG.joystickSensitivity;
    ay += joy.dy * CONFIG.joystickSensitivity;
  }
  if (tilt.enabled) {
    ax += tilt.x * CONFIG.tiltSensitivity;
    ay += tilt.y * CONFIG.tiltSensitivity;
  }

  // Keyboard: normalize diagonal so it isn't faster than cardinal
  const kx = (keys.ArrowRight ? 1 : 0) - (keys.ArrowLeft ? 1 : 0);
  const ky = (keys.ArrowDown  ? 1 : 0) - (keys.ArrowUp   ? 1 : 0);
  const kLen = Math.hypot(kx, ky);
  if (kLen > 0) {
    ax += (kx / kLen) * CONFIG.keyboardSensitivity;
    ay += (ky / kLen) * CONFIG.keyboardSensitivity;
  }
  // No further normalisation — analog magnitude is intentional; maxSpeed is the ceiling

  // All inputs express screen-space intent; map through the iso camera
  [ax, ay] = screenDirToWorld(ax, ay);

  ball.vx += ax * CONFIG.acceleration * dt;
  ball.vy += ay * CONFIG.acceleration * dt;

  // ── Moving platforms & surface tiles ──────────────────────────
  updateMovers(floor, dt);
  const mover = moverUnder(floor, ball);
  let frictionMul = 1;   // 2 = slows twice as fast (mud), 0.5 = half friction (ice)
  let capMul      = 1;   // top-speed multiplier on this surface
  if (mover) {
    // Carried by the platform; its surface is high-friction
    ball.x += mover.dx;
    ball.y += mover.dy;
    frictionMul = 2;
    capMul      = 0.5;
    gs.surface  = 'mover';
  } else if (ball.z <= 1) {
    const tt = tileTypeAt(floor, ball.x, ball.y);
    if (tt === 'mud')      { frictionMul = 2; capMul = 0.8; }
    else if (tt === 'ice')   frictionMul = 0.5;
    else if (tt === 'lava' || tt === 'pit') { startDeath(tt); return; }
    if (tt !== 'normal') gs.surface = tt;
  }

  // Speed cap
  const cap = CONFIG.maxSpeed * capMul;
  const spd = Math.hypot(ball.vx, ball.vy);
  if (spd > cap) {
    ball.vx = (ball.vx / spd) * cap;
    ball.vy = (ball.vy / spd) * cap;
  }

  // Friction (applied before move so we can still build speed each frame)
  const fr = 1 - (1 - CONFIG.friction) * frictionMul;
  ball.vx *= fr;
  ball.vy *= fr;

  // Integrate position
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // ── Wall collisions ──────────────────────────────────────────
  // Left wall
  if (ball.x - r < wt) {
    const imp = Math.abs(ball.vx);
    ball.x  = wt + r;
    ball.vx = imp * CONFIG.wallBounce;
    onBounce(wt, ball.y, imp);
  }
  // Top wall
  if (ball.y - r < wt) {
    const imp = Math.abs(ball.vy);
    ball.y  = wt + r;
    ball.vy = imp * CONFIG.wallBounce;
    onBounce(ball.x, wt, imp);
  }
  // Bottom wall
  if (ball.y + r > floor.height - wt) {
    const imp = Math.abs(ball.vy);
    ball.y  = floor.height - wt - r;
    ball.vy = -imp * CONFIG.wallBounce;
    onBounce(ball.x, floor.height - wt, imp);
  }
  // Right wall (with door gap on floor 2)
  const rightInner = floor.width - wt;
  if (ball.x + r > rightInner) {
    const door = floor.door;
    if (door && door.wall === 'right' && exitUnlocked(gs.floor)) {
      const inGap = ball.y > door.center - door.width / 2 &&
                    ball.y < door.center + door.width / 2;
      if (inGap) {
        triggerEnd();
        return;
      }
    }
    const imp = Math.abs(ball.vx);
    ball.x  = rightInner - r;
    ball.vx = -imp * CONFIG.wallBounce;
    onBounce(rightInner, ball.y, imp);
  }

  // ── Platform & inner-wall collisions ──────────────────────────
  const solids = [...(floor.platformStructures || []), ...(floor.innerWalls || [])];
  for (const ps of solids) {
    // Closest point on platform rect to ball center
    const cx   = Math.max(ps.x, Math.min(ball.x, ps.x + ps.w));
    const cy   = Math.max(ps.y, Math.min(ball.y, ps.y + ps.h));
    const dx   = ball.x - cx;
    const dy   = ball.y - cy;
    const dist = Math.hypot(dx, dy);
    if (dist > 0 && dist < r) {
      const nx   = dx / dist;
      const ny   = dy / dist;
      // Push ball out of platform
      ball.x = cx + nx * r;
      ball.y = cy + ny * r;
      // Reflect velocity along collision normal
      const vdn = ball.vx * nx + ball.vy * ny;
      if (vdn < 0) {
        ball.vx -= (1 + CONFIG.wallBounce) * vdn * nx;
        ball.vy -= (1 + CONFIG.wallBounce) * vdn * ny;
        onBounce(cx, cy, Math.abs(vdn));
      }
    }
  }

  // ── Trigger pads ────────────────────────────────────────────
  updateTriggers();

  // ── Hole check — only swallows the ball once unlocked ────────
  if (floor.hole && exitUnlocked(gs.floor)) {
    const d = Math.hypot(ball.x - floor.hole.x, ball.y - floor.hole.y);
    if (d < floor.hole.r - r * 0.4) {
      triggerTransition();
    }
  }
}

// ── Transitions ──────────────────────────────────────────────────
const FADE_SPEED = 2.8; // alpha units per second

function triggerTransition() {
  if (gs.transitioning) return;
  gs.transitioning = true;
  gs.transDir      = 1;   // start fading out
  gs.transAlpha    = 0;
}

function updateTransition(dt) {
  if (!gs.transitioning) return;
  gs.transAlpha += gs.transDir * FADE_SPEED * dt;

  if (gs.transDir === 1 && gs.transAlpha >= 1) {
    gs.transAlpha = 1;
    gs.transDir   = -1;  // now fade back in
    // Descend to the next floor
    gs.floor = Math.min(gs.floor + 1, floors.length - 1);
    const f   = floors[gs.floor];
    gs.ball.x = f.startX;
    gs.ball.y = f.startY;
    gs.ball.vx = 0;
    gs.ball.vy = 0;
    snapCamera();
    updateFloorLabel();
  } else if (gs.transDir === -1 && gs.transAlpha <= 0) {
    gs.transAlpha  = 0;
    gs.transitioning = false;
  }
}

function triggerEnd() {
  if (gs.ended) return;
  gs.ended   = true;
  gs.endFade = 0;
}

function updateEndFade(dt) {
  if (!gs.ended) return;
  gs.endFade = Math.min(1, gs.endFade + FADE_SPEED * dt);
  if (gs.endFade >= 1) {
    document.getElementById('end-screen').style.display = 'flex';
  }
}

// ── Camera ───────────────────────────────────────────────────────
// The camera is a world-space focus point that trails the ball; the
// iso projection centres the screen on it.
function snapCamera() {
  gs.camera.x = gs.ball.x;
  gs.camera.y = gs.ball.y;
}

function updateCamera(dt) {
  const t = 1 - Math.exp(-CONFIG.cameraSmoothing * dt);
  gs.camera.x += (gs.ball.x - gs.camera.x) * t;
  gs.camera.y += (gs.ball.y - gs.camera.y) * t;
}

// ── Drawing (isometric) ───────────────────────────────────────────

// Trace the projected quad of 4 world-space corners at height wz
function isoQuadPath(corners, wz) {
  const p0 = isoProject(corners[0][0], corners[0][1], wz);
  ctx.beginPath();
  ctx.moveTo(p0.x, p0.y);
  for (let i = 1; i < corners.length; i++) {
    const p = isoProject(corners[i][0], corners[i][1], wz);
    ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
}

// Project a world-space direction (not a point) to screen space
function dirToScreen(nx, ny) {
  const a  = viewAngle();
  const ca = Math.cos(a), sa = Math.sin(a);
  const rx = nx * ca - ny * sa;
  const ry = nx * sa + ny * ca;
  return { x: rx - ry, y: (rx + ry) * ISO_Y };
}

// Floor slab + tile grid
function drawFloorBase(floor) {
  const corners = [[0, 0], [floor.width, 0], [floor.width, floor.height], [0, floor.height]];

  // Slab side below the ground plane — floating-island depth
  isoQuadPath(corners, -26);
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fill();

  // Ground plane
  isoQuadPath(corners, 0);
  ctx.fillStyle = floor.tileColor;
  ctx.fill();

  // Special surface tiles (mud / ice / lava / pit)
  if (floor.tiles) {
    const ts   = CONFIG.tileSize;
    const time = gs ? gs.time : 0;
    for (const key in floor.tiles) {
      const ci = key.indexOf(',');
      const c  = +key.slice(0, ci), r = +key.slice(ci + 1);
      const x0 = c * ts, y0 = r * ts;
      const p  = isoProject(x0 + ts / 2, y0 + ts / 2, 0);
      if (p.x < -150 || p.x > W + 150 || p.y < -120 || p.y > H + 120) continue;

      const type = floor.tiles[key];
      isoQuadPath([[x0, y0], [x0 + ts, y0], [x0 + ts, y0 + ts], [x0, y0 + ts]], 0);
      if (type === 'mud') {
        ctx.fillStyle = '#5d452c';
      } else if (type === 'ice') {
        ctx.fillStyle = '#a9cfdf';
      } else if (type === 'lava') {
        const g = 0.5 + 0.5 * Math.sin(time * 2.6 + c * 1.7 + r * 2.3);
        ctx.fillStyle = `rgb(${Math.round(185 + 55 * g)},${Math.round(48 + 62 * g)},12)`;
      } else {            // pit
        ctx.fillStyle = '#070707';
      }
      ctx.fill();

      if (type === 'ice') {
        // Sheen streak
        ctx.beginPath();
        const s1 = isoProject(x0 + ts * 0.2, y0 + ts * 0.55, 0);
        const s2 = isoProject(x0 + ts * 0.65, y0 + ts * 0.15, 0);
        ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y);
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth   = 2;
        ctx.stroke();
      } else if (type === 'lava') {
        // Bright molten core
        const g = 0.5 + 0.5 * Math.sin(time * 3.4 + c * 2.9 + r * 1.3);
        isoQuadPath([[x0 + ts * 0.3, y0 + ts * 0.3], [x0 + ts * 0.7, y0 + ts * 0.3],
                     [x0 + ts * 0.7, y0 + ts * 0.7], [x0 + ts * 0.3, y0 + ts * 0.7]], 0);
        ctx.fillStyle = `rgba(255,${Math.round(160 + 60 * g)},60,${(0.35 + 0.4 * g).toFixed(3)})`;
        ctx.fill();
      } else if (type === 'pit') {
        // Inner edge shadow ring
        isoQuadPath([[x0, y0], [x0 + ts, y0], [x0 + ts, y0 + ts], [x0, y0 + ts]], 0);
        ctx.strokeStyle = 'rgba(0,0,0,0.85)';
        ctx.lineWidth   = 3;
        ctx.stroke();
      }
    }
  }

  // Tile grid along both world axes
  const ts = CONFIG.tileSize;
  ctx.strokeStyle = `rgba(${CONFIG.gridLineColor},${CONFIG.gridLineOpacity})`;
  ctx.lineWidth   = CONFIG.gridLineThickness;
  ctx.beginPath();
  for (let gx = 0; gx <= floor.width; gx += ts) {
    const a = isoProject(gx, 0, 0), b = isoProject(gx, floor.height, 0);
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
  }
  for (let gy = 0; gy <= floor.height; gy += ts) {
    const a = isoProject(0, gy, 0), b = isoProject(floor.width, gy, 0);
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
  }
  ctx.stroke();
}

// Solid box standing on the ground plane — walls, platforms, doors.
// Only the two camera-facing side faces are drawn, then the top.
function drawIsoBox(bx, by, bw, bh, hz, topColor, sideLight, sideDark, alpha = 1) {
  const c  = [[bx, by], [bx + bw, by], [bx + bw, by + bh], [bx, by + bh]];
  const pb = c.map(([x, y]) => isoProject(x, y, 0));

  // Cull fully off-screen boxes
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const p of pb) {
    if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
  }
  if (maxX < -40 || minX > W + 40 || maxY < -40 || minY - hz > H + 40) return;

  const pt = c.map(([x, y]) => isoProject(x, y, hz));
  ctx.save();
  ctx.globalAlpha = alpha;

  for (let i = 0; i < 4; i++) {
    const j = (i + 1) % 4;
    // Outward normal of this face; faces pointing toward the camera have n.y > 0
    const n = dirToScreen(c[j][1] - c[i][1], -(c[j][0] - c[i][0]));
    if (n.y <= 0.001) continue;
    ctx.beginPath();
    ctx.moveTo(pb[i].x, pb[i].y);
    ctx.lineTo(pb[j].x, pb[j].y);
    ctx.lineTo(pt[j].x, pt[j].y);
    ctx.lineTo(pt[i].x, pt[i].y);
    ctx.closePath();
    ctx.fillStyle = n.x >= 0 ? sideDark : sideLight;   // light source on the left
    ctx.fill();
  }

  isoQuadPath(c, hz);
  ctx.fillStyle = topColor;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth   = 1;
  ctx.stroke();
  ctx.restore();
}

// Split a long wall rect into short segments so painter's-algorithm
// depth sorting against the ball stays correct.
function wallSegments(rect) {
  const seg  = CONFIG.tileSize * 2;
  const segs = [];
  if (rect.w >= rect.h) {
    for (let sx = rect.x; sx < rect.x + rect.w; sx += seg)
      segs.push({ x: sx, y: rect.y, w: Math.min(seg, rect.x + rect.w - sx), h: rect.h });
  } else {
    for (let sy = rect.y; sy < rect.y + rect.h; sy += seg)
      segs.push({ x: rect.x, y: sy, w: rect.w, h: Math.min(seg, rect.y + rect.h - sy) });
  }
  return segs;
}

function drawHole(hole, locked) {
  const p = isoProject(hole.x, hole.y, 0);
  const r = hole.r;
  if (p.x + r * 2 < 0 || p.x - r * 2 > W || p.y + r * 2 < 0 || p.y - r * 2 > H) return;

  // Draw in a squashed local frame so circles become ground-plane ellipses
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.scale(1, ISO_Y);
  const hx = 0, hy = 0;

  // Recessed dark pit with radial gradient
  const grad = ctx.createRadialGradient(hx - r * 0.25, hy - r * 0.25, 1, hx, hy, r);
  grad.addColorStop(0,   '#161410');
  grad.addColorStop(0.5, '#0c0b09');
  grad.addColorStop(1,   '#000000');

  ctx.beginPath();
  ctx.arc(hx, hy, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Outer shadow rim (depth illusion)
  ctx.beginPath();
  ctx.arc(hx, hy, r + 3, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth   = 5;
  ctx.stroke();

  if (locked) {
    // Grate bars covering the pit
    ctx.save();
    ctx.beginPath();
    ctx.arc(hx, hy, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.strokeStyle = 'rgba(150,150,160,0.75)';
    ctx.lineWidth   = 4;
    ctx.beginPath();
    for (let off = -r; off <= r; off += r * 0.5) {
      ctx.moveTo(hx + off, hy - r);
      ctx.lineTo(hx + off, hy + r);
    }
    ctx.stroke();
    ctx.restore();

    // Red "locked" rim (pulsing)
    const pulse = 0.45 + 0.25 * Math.sin(Date.now() / 300);
    ctx.beginPath();
    ctx.arc(hx, hy, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,70,60,${pulse.toFixed(3)})`;
    ctx.lineWidth   = 2.5;
    ctx.stroke();
    ctx.restore();
    return;
  }

  // Gold/yellow warning rim
  ctx.beginPath();
  ctx.arc(hx, hy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,200,60,0.5)';
  ctx.lineWidth   = 2;
  ctx.stroke();

  // Tiny highlight dot (top-left)
  ctx.beginPath();
  ctx.arc(hx - r * 0.35, hy - r * 0.35, r * 0.18, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fill();
  ctx.restore();
}

// Trigger pad — circular floor plate; lights up green once activated
function drawTrigger(t, floor) {
  const fi = floor.index;
  const p  = isoProject(t.x, t.y, 0);
  if (p.x + t.r * 3 < 0 || p.x - t.r * 3 > W || p.y + t.r * 3 < 0 || p.y - t.r * 3 > H) return;
  const active = !!gs.activated[fi][t.id];
  const pulse  = 0.5 + 0.5 * Math.sin(Date.now() / 350);

  // Squashed local frame: circles render as ground-plane ellipses
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.scale(1, ISO_Y);
  const tx = 0, ty = 0;

  // Recessed plate base
  ctx.beginPath();
  ctx.arc(tx, ty, t.r, 0, Math.PI * 2);
  ctx.fillStyle = active ? 'rgba(40,90,55,0.95)' : 'rgba(0,0,0,0.30)';
  ctx.fill();

  if (active) {
    // Glow halo
    const glow = ctx.createRadialGradient(tx, ty, t.r * 0.4, tx, ty, t.r * 2.1);
    glow.addColorStop(0, 'rgba(90,255,140,0.30)');
    glow.addColorStop(1, 'rgba(90,255,140,0)');
    ctx.beginPath();
    ctx.arc(tx, ty, t.r * 2.1, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }

  // Ring
  ctx.beginPath();
  ctx.arc(tx, ty, t.r, 0, Math.PI * 2);
  ctx.strokeStyle = active
    ? 'rgba(110,255,160,0.95)'
    : `rgba(90,200,255,${(0.35 + pulse * 0.4).toFixed(3)})`;
  ctx.lineWidth = 3;
  ctx.stroke();

  // Inner ring detail
  ctx.beginPath();
  ctx.arc(tx, ty, t.r * 0.62, 0, Math.PI * 2);
  ctx.strokeStyle = active ? 'rgba(110,255,160,0.5)' : 'rgba(90,200,255,0.22)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();   // leave the squashed frame before text

  // Label — sequence floors show required order; others show a dot
  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  if (floor.requireSequence) {
    ctx.font      = 'bold 18px "Helvetica Neue", Helvetica, Arial, sans-serif';
    ctx.fillStyle = active ? 'rgba(220,255,230,0.95)' : 'rgba(255,255,255,0.55)';
    ctx.fillText(String(t.order + 1), p.x, p.y + 1);
  } else {
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, 5, 5 * ISO_Y, 0, 0, Math.PI * 2);
    ctx.fillStyle = active ? 'rgba(220,255,230,0.95)' : 'rgba(255,255,255,0.4)';
    ctx.fill();
  }
  ctx.restore();
}

// Door in the right perimeter wall, rendered as a box in the wall gap:
// full-height sealed slab when locked, low golden threshold when open.
function doorBoxRect(floor) {
  const wt = CONFIG.wallThickness;
  const d  = floor.door;
  return { x: floor.width - wt, y: d.center - d.width / 2, w: wt, h: d.width };
}

function drawDoorBox(floor, b, unlocked, alpha) {
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
  if (unlocked) {
    drawIsoBox(b.x, b.y, b.w, b.h, 6, '#ffe080', '#ffd24d', '#caa030', alpha);
    // Light spill onto the floor in front of the threshold
    ctx.save();
    ctx.globalAlpha = alpha * (0.25 + pulse * 0.1);
    isoQuadPath([[b.x - 70, b.y], [b.x, b.y], [b.x, b.y + b.h], [b.x - 70, b.y + b.h]], 0);
    ctx.fillStyle = 'rgba(255,230,80,0.5)';
    ctx.fill();
    ctx.restore();
  } else {
    drawIsoBox(b.x, b.y, b.w, b.h, CONFIG.wallHeight, '#3a1c20', '#552a30', '#2a1418', alpha);
  }
  // Billboard label above the door
  const p = isoProject(b.x + b.w / 2, b.y + b.h / 2, CONFIG.wallHeight + 16);
  ctx.save();
  ctx.globalAlpha  = alpha;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.font         = 'bold 11px "Helvetica Neue", Helvetica, Arial, sans-serif';
  ctx.fillStyle    = unlocked ? '#ffd84d' : `rgba(255,120,110,${(0.55 + pulse * 0.4).toFixed(3)})`;
  ctx.fillText(unlocked ? 'EXIT' : 'LOCKED', p.x, p.y);
  ctx.restore();
}
function drawFloor(floor) {
  drawFloorBase(floor);

  // Flat ground-level features
  const unlocked = exitUnlocked(floor.index);
  for (const t of (floor.triggers || [])) drawTrigger(t, floor);
  if (floor.hole) drawHole(floor.hole, !unlocked);
  drawBounceEffects();

  // Raised geometry, depth-sorted with the ball (painter's algorithm)
  const wt = CONFIG.wallThickness;
  const wh = CONFIG.wallHeight;
  const boxes = [];
  const pushWall = rect => {
    if (rect.w <= 0 || rect.h <= 0) return;
    for (const s of wallSegments(rect)) boxes.push({ ...s, hz: wh, kind: 'wall' });
  };

  // Perimeter (left/right walls inset so corners aren't double-drawn)
  pushWall({ x: 0, y: 0,                 w: floor.width, h: wt });
  pushWall({ x: 0, y: floor.height - wt, w: floor.width, h: wt });
  pushWall({ x: 0, y: wt, w: wt, h: floor.height - wt * 2 });
  if (floor.door && floor.door.wall === 'right') {
    const gapTop = floor.door.center - floor.door.width / 2;
    const gapBot = floor.door.center + floor.door.width / 2;
    pushWall({ x: floor.width - wt, y: wt,     w: wt, h: gapTop - wt });
    pushWall({ x: floor.width - wt, y: gapBot, w: wt, h: floor.height - wt - gapBot });
    boxes.push({ ...doorBoxRect(floor), hz: unlocked ? 6 : wh, kind: 'door' });
  } else {
    pushWall({ x: floor.width - wt, y: wt, w: wt, h: floor.height - wt * 2 });
  }
  for (const iw of (floor.innerWalls || [])) pushWall(iw);
  for (const ps of (floor.platformStructures || []))
    boxes.push({ x: ps.x, y: ps.y, w: ps.w, h: ps.h, hz: CONFIG.platformHeight, kind: 'platform' });
  for (const m of (floor.movers || []))
    boxes.push({ x: m.cx, y: m.cy, w: m.w, h: m.h, hz: 10, kind: 'mover' });

  const ball      = gs.ball;
  const ballDepth = isoDepth(ball.x, ball.y);
  const ballP     = isoProject(ball.x, ball.y, 0);

  const items = boxes.map(b => ({ depth: isoDepth(b.x + b.w / 2, b.y + b.h / 2), box: b }));
  items.push({ depth: ballDepth, ball: true });
  items.sort((a, b) => a.depth - b.depth);

  for (const it of items) {
    if (it.ball) { drawBall(ball); continue; }
    const b = it.box;

    // Soften geometry that stands between the camera and the ball
    let alpha = 1;
    if (it.depth > ballDepth) {
      const bp = isoProject(b.x + b.w / 2, b.y + b.h / 2, 0);
      if (Math.abs(bp.x - ballP.x) < (b.w + b.h) / 2 + 60 &&
          bp.y > ballP.y - 24 && bp.y < ballP.y + b.hz + 90) alpha = 0.45;
    }

    if (b.kind === 'door') {
      drawDoorBox(floor, b, unlocked, alpha);
    } else if (b.kind === 'platform') {
      drawIsoBox(b.x, b.y, b.w, b.h, b.hz, '#5d5848', floor.wallHighlight, floor.wallShadow, alpha);
    } else if (b.kind === 'mover') {
      drawIsoBox(b.x, b.y, b.w, b.h, b.hz, '#4a4a52', '#5e5e68', '#2c2c32', alpha);
    } else {
      drawIsoBox(b.x, b.y, b.w, b.h, b.hz, floor.wallColor, floor.wallHighlight, floor.wallShadow, alpha);
    }
  }
}

function drawBall(ball) {
  if (gs.dying) { drawDyingBall(); return; }
  const r = CONFIG.ballRadius;
  const g = isoProject(ball.x, ball.y, 0);
  if (g.x < -60 || g.x > W + 60 || g.y < -60 || g.y > H + 60) return;

  // Ground shadow stays on the floor plane even when the ball is airborne
  ctx.beginPath();
  ctx.ellipse(g.x, g.y, r * 0.85, r * 0.85 * ISO_Y, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.fill();

  // Sphere centre floats ball-radius above its ground point (+ jump height)
  const bx = g.x;
  const by = g.y - r * 0.9 - (ball.z || 0);

  // Ball body — warm off-white marble gradient
  const body = ctx.createRadialGradient(bx - r * 0.32, by - r * 0.32, 0, bx, by, r);
  body.addColorStop(0,    '#e8e2d4');
  body.addColorStop(0.35, '#cfc6af');
  body.addColorStop(0.72, '#a09070');
  body.addColorStop(1,    '#5a5040');

  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI * 2);
  ctx.fillStyle = body;
  ctx.fill();

  // Bright specular highlight (top-left catch light)
  const spec = ctx.createRadialGradient(bx - r * 0.28, by - r * 0.38, 0, bx - r * 0.15, by - r * 0.15, r * 0.6);
  spec.addColorStop(0,   'rgba(255,255,255,0.92)');
  spec.addColorStop(0.35,'rgba(255,255,255,0.35)');
  spec.addColorStop(1,   'rgba(255,255,255,0)');

  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI * 2);
  ctx.fillStyle = spec;
  ctx.fill();

  // Thin rim
  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth   = 1;
  ctx.stroke();
}

// Death animation: pit = sink & shrink into the dark; lava = flash, then ash pile
function drawDyingBall() {
  const d = gs.dying;
  const r = CONFIG.ballRadius;
  const g = isoProject(d.x, d.y, 0);
  const k = Math.min(1, d.t / 0.9);   // 0 → 1 over the animation

  if (d.type === 'pit') {
    const scale = 1 - k;
    if (scale <= 0.02) return;
    const by = g.y - r * 0.9 * scale + k * 26;   // sinks below the floor plane
    ctx.save();
    ctx.globalAlpha = 1 - k * 0.85;
    const body = ctx.createRadialGradient(g.x - r * 0.3 * scale, by - r * 0.3 * scale, 0, g.x, by, r * scale);
    body.addColorStop(0, '#9a9284');
    body.addColorStop(1, '#1c1812');
    ctx.beginPath();
    ctx.arc(g.x, by, r * scale, 0, Math.PI * 2);
    ctx.fillStyle = body;
    ctx.fill();
    ctx.restore();
    return;
  }

  // Lava
  if (k < 0.35) {
    // White-hot flash before the marble is consumed
    const flash = 1 - k / 0.35;
    const by = g.y - r * 0.9;
    ctx.beginPath();
    ctx.arc(g.x, by, r * (1 + (1 - flash) * 0.4), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,${Math.round(140 + flash * 115)},${Math.round(60 + flash * 195)},0.95)`;
    ctx.fill();
  } else {
    // Small pile of black ash
    const grow = Math.min(1, (k - 0.35) / 0.3);
    ctx.beginPath();
    ctx.ellipse(g.x, g.y, r * 1.05 * grow, r * 0.45 * grow * ISO_Y * 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#15120e';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(g.x, g.y - 3 * grow, r * 0.55 * grow, r * 0.3 * grow, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#0b0908';
    ctx.fill();
    // Fading embers in the pile
    const ember = Math.max(0, 1 - (d.t - 0.65) / 0.8);
    if (ember > 0) {
      for (let i = 0; i < 3; i++) {
        const ex = g.x + Math.sin(i * 2.4 + 1) * r * 0.4;
        const ey = g.y - 2 + Math.cos(i * 1.7) * r * 0.15;
        ctx.beginPath();
        ctx.arc(ex, ey, 1.6, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,120,40,${(ember * (0.5 + 0.5 * Math.sin(gs.time * 9 + i * 2))).toFixed(3)})`;
        ctx.fill();
      }
    }
  }
}

function drawJoystickHUD() {
  if (!joy.active) return;

  const bx  = joy.baseX;
  const by  = joy.baseY;
  const MAX = CONFIG.joystickRadius;
  const hx  = bx + joy.dx * MAX;
  const hy  = by + joy.dy * MAX;
  const mag = Math.hypot(joy.dx, joy.dy);

  // Max-range ring (shows input boundary)
  ctx.beginPath();
  ctx.arc(bx, by, MAX, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth   = 1;
  ctx.stroke();

  // Line from anchor to handle
  if (mag > 0.05) {
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(hx, hy);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
  }

  // Anchor dot
  ctx.beginPath();
  ctx.arc(bx, by, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.fill();

  // Handle dot (brightens with deflection magnitude)
  ctx.beginPath();
  ctx.arc(hx, hy, 13, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,${(0.22 + mag * 0.18).toFixed(2)})`;
  ctx.fill();
  ctx.strokeStyle = `rgba(255,255,255,${(0.35 + mag * 0.25).toFixed(2)})`;
  ctx.lineWidth   = 1.5;
  ctx.stroke();
}

function drawPauseHUD() {
  const { cx, cy, r } = PAUSE_GFX;
  const paused = gs && gs.paused;

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle   = paused ? 'rgba(255,185,0,0.30)' : 'rgba(255,255,255,0.09)';
  ctx.fill();
  ctx.strokeStyle = paused ? 'rgba(255,185,0,0.75)' : 'rgba(255,255,255,0.22)';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  ctx.fillStyle    = paused ? '#ffb800' : 'rgba(255,255,255,0.65)';
  ctx.font         = 'bold 10px "Helvetica Neue", Helvetica, Arial, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(paused ? 'GO' : 'HOLD', cx, cy);
  ctx.textBaseline = 'alphabetic';
}

function toggleMap() {
  if (!gs || gs.ended) return;
  gs.mapOpen = !gs.mapOpen;
  const btn = document.getElementById('map-btn');
  btn.textContent = gs.mapOpen ? 'RESUME' : 'MAP';
  btn.classList.toggle('open', gs.mapOpen);
}

function drawMapOverlay(alpha) {
  const floor  = floors[gs.floor];
  const PAD    = 28;
  const HDR    = 44;   // header height (title)
  const LEG    = 32;   // legend height below map

  const availW = W - PAD * 2;
  const availH = H - PAD * 2 - HDR - LEG;
  const scale  = Math.min(availW / floor.width, availH / floor.height);

  const mapW = floor.width  * scale;
  const mapH = floor.height * scale;
  const mapX = Math.round((W - mapW) / 2);
  const mapY = Math.round(PAD + HDR);
  const wt   = Math.max(2, CONFIG.wallThickness * scale);

  ctx.save();
  ctx.globalAlpha = alpha;

  // Dark scrim
  ctx.fillStyle = 'rgba(0,0,0,0.86)';
  ctx.fillRect(0, 0, W, H);

  // Panel background
  ctx.fillStyle = 'rgba(18,20,28,0.97)';
  ctx.fillRect(mapX - 10, mapY - 10, mapW + 20, mapH + 20 + LEG);

  // Floor field
  ctx.fillStyle = floor.tileColor;
  ctx.fillRect(mapX, mapY, mapW, mapH);

  // Subtle tile grid on map
  ctx.strokeStyle = floor.tileLineColor;
  ctx.lineWidth   = 0.5;
  const gridStep = Math.round(CONFIG.tileSize * scale);
  if (gridStep > 4) {
    ctx.beginPath();
    for (let gx = mapX; gx <= mapX + mapW; gx += gridStep) {
      ctx.moveTo(gx, mapY); ctx.lineTo(gx, mapY + mapH);
    }
    for (let gy = mapY; gy <= mapY + mapH; gy += gridStep) {
      ctx.moveTo(mapX, gy); ctx.lineTo(mapX + mapW, gy);
    }
    ctx.stroke();
  }

  // Walls — helper to fill a wall rect
  function mwall(wx, wy, ww, wh) {
    ctx.fillStyle = floor.wallColor;
    ctx.fillRect(mapX + wx * scale, mapY + wy * scale, ww * scale, wh * scale);
  }
  const fw = floor.width, fh = floor.height, WT = CONFIG.wallThickness;
  const unlocked = exitUnlocked(gs.floor);
  mwall(0, 0, fw, WT);                    // top
  mwall(0, fh - WT, fw, WT);             // bottom
  mwall(0, 0, WT, fh);                   // left
  if (floor.door && floor.door.wall === 'right') {
    const gapTop = floor.door.center - floor.door.width / 2;
    const gapBot = floor.door.center + floor.door.width / 2;
    mwall(fw - WT, 0,      WT, gapTop);
    mwall(fw - WT, gapBot, WT, fh - gapBot);
    // Door gap highlight — gold when open, red when sealed
    ctx.fillStyle = unlocked ? '#ffcc22' : '#cc3333';
    ctx.fillRect(mapX + (fw - WT) * scale, mapY + gapTop * scale,
                 Math.max(wt, 3), (gapBot - gapTop) * scale);
  } else {
    mwall(fw - WT, 0, WT, fh);           // right (solid)
  }

  // Surface tiles (under walls/triggers so hazards read clearly)
  if (floor.tiles) {
    const ts = CONFIG.tileSize;
    const TILE_COLORS = { mud: '#5d452c', ice: '#a9cfdf', lava: '#d04812', pit: '#000000' };
    for (const key in floor.tiles) {
      const ci = key.indexOf(',');
      const c  = +key.slice(0, ci), r = +key.slice(ci + 1);
      ctx.fillStyle = TILE_COLORS[floor.tiles[key]];
      ctx.fillRect(mapX + c * ts * scale, mapY + r * ts * scale, ts * scale + 0.5, ts * scale + 0.5);
    }
  }

  // Moving platforms — track line + current position
  for (const m of (floor.movers || [])) {
    ctx.strokeStyle = 'rgba(170,170,190,0.4)';
    ctx.lineWidth   = 1;
    ctx.setLineDash([2, 2]);
    ctx.beginPath();
    ctx.moveTo(mapX + (m.x1 + m.w / 2) * scale, mapY + (m.y1 + m.h / 2) * scale);
    ctx.lineTo(mapX + (m.x2 + m.w / 2) * scale, mapY + (m.y2 + m.h / 2) * scale);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#4a4a52';
    ctx.strokeStyle = 'rgba(200,200,215,0.8)';
    ctx.fillRect(mapX + m.cx * scale, mapY + m.cy * scale, m.w * scale, m.h * scale);
    ctx.strokeRect(mapX + m.cx * scale, mapY + m.cy * scale, m.w * scale, m.h * scale);
  }

  // Inner maze walls
  for (const iw of (floor.innerWalls || [])) {
    mwall(iw.x, iw.y, iw.w, iw.h);
  }

  // Trigger pads
  for (const t of (floor.triggers || [])) {
    const txm = mapX + t.x * scale;
    const tym = mapY + t.y * scale;
    const trm = Math.max(4, t.r * scale);
    const active = !!gs.activated[gs.floor][t.id];
    ctx.beginPath();
    ctx.arc(txm, tym, trm, 0, Math.PI * 2);
    ctx.fillStyle = active ? 'rgba(90,220,130,0.9)' : 'rgba(20,30,40,0.9)';
    ctx.fill();
    ctx.strokeStyle = active ? 'rgba(140,255,180,1)' : 'rgba(90,200,255,0.8)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    if (floor.requireSequence) {
      ctx.fillStyle    = active ? 'rgba(10,30,15,0.9)' : 'rgba(255,255,255,0.7)';
      ctx.font         = `bold ${Math.max(8, Math.round(trm * 1.1))}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(t.order + 1), txm, tym + 0.5);
    }
  }

  // Hole
  if (floor.hole) {
    const hx = mapX + floor.hole.x * scale;
    const hy = mapY + floor.hole.y * scale;
    const hr = Math.max(5, floor.hole.r * scale);
    ctx.beginPath();
    ctx.arc(hx, hy, hr, 0, Math.PI * 2);
    ctx.fillStyle = '#050403';
    ctx.fill();
    ctx.strokeStyle = unlocked ? 'rgba(255,200,60,0.7)' : 'rgba(255,80,70,0.85)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
  }

  // View indicator — approximate visible region, rotated with the camera
  ctx.save();
  ctx.translate(mapX + gs.camera.x * scale, mapY + gs.camera.y * scale);
  ctx.rotate(-viewAngle());
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth   = 1;
  ctx.setLineDash([3, 3]);
  const vw = W * scale, vh = (H / ISO_Y) * scale;
  ctx.strokeRect(-vw / 2, -vh / 2, vw, vh);
  ctx.setLineDash([]);
  ctx.restore();

  // Compass — which way the camera is facing (N = world up)
  ctx.save();
  ctx.translate(mapX + mapW - 18, mapY + 18);
  ctx.rotate(viewAngle());
  ctx.fillStyle = 'rgba(255,160,60,0.9)';
  ctx.beginPath();
  ctx.moveTo(0, -10); ctx.lineTo(5, 6); ctx.lineTo(0, 2); ctx.lineTo(-5, 6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Ball marker (pulsing ring + dot)
  const bx  = mapX + gs.ball.x * scale;
  const by  = mapY + gs.ball.y * scale;
  const br  = Math.max(5, CONFIG.ballRadius * scale);
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 280);
  ctx.beginPath();
  ctx.arc(bx, by, br + pulse * 4, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,255,255,${0.28 * pulse})`;
  ctx.lineWidth   = 1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(bx, by, br, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // Start position crosshair
  ctx.strokeStyle = 'rgba(100,220,100,0.4)';
  ctx.lineWidth   = 1;
  const sx = mapX + floor.startX * scale;
  const sy = mapY + floor.startY * scale;
  ctx.beginPath();
  ctx.moveTo(sx - 5, sy); ctx.lineTo(sx + 5, sy);
  ctx.moveTo(sx, sy - 5); ctx.lineTo(sx, sy + 5);
  ctx.stroke();

  // Title
  ctx.fillStyle    = 'rgba(255,255,255,0.88)';
  ctx.font         = '600 13px "Helvetica Neue", Helvetica, Arial, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(floor.label.toUpperCase() + ' — MAP', W / 2, PAD + HDR / 2);

  // Legend row
  const legY = mapY + mapH + LEG / 2;
  ctx.font         = '11px "Helvetica Neue", Helvetica, Arial, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign    = 'left';
  let lx = mapX + 4;

  // You (ball)
  ctx.beginPath();
  ctx.arc(lx + 5, legY, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('You', lx + 14, legY);
  lx += 52;

  // Start
  ctx.strokeStyle = 'rgba(100,220,100,0.6)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(lx, legY); ctx.lineTo(lx + 10, legY);
  ctx.moveTo(lx + 5, legY - 5); ctx.lineTo(lx + 5, legY + 5);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('Start', lx + 14, legY);
  lx += 58;

  if (floor.triggers && floor.triggers.length) {
    ctx.beginPath();
    ctx.arc(lx + 5, legY, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(20,30,40,0.9)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(90,200,255,0.8)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText('Trigger', lx + 14, legY);
    lx += 68;
  }

  if (floor.hole) {
    ctx.beginPath();
    ctx.arc(lx + 5, legY, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#050403';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,200,60,0.8)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText('Hole', lx + 14, legY);
    lx += 52;
  }

  const hasHazard = floor.tiles && Object.keys(floor.tiles).some(k => floor.tiles[k] === 'lava' || floor.tiles[k] === 'pit');
  if (hasHazard) {
    ctx.fillStyle = '#d04812';
    ctx.fillRect(lx, legY - 5, 5, 10);
    ctx.fillStyle = '#000000';
    ctx.fillRect(lx + 5, legY - 5, 5, 10);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText('Hazard', lx + 14, legY);
    lx += 70;
  }

  if (floor.door) {
    ctx.fillStyle = '#ffcc22';
    ctx.fillRect(lx, legY - 5, 8, 10);
