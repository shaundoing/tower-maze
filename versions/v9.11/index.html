    gs.ball.x = f.startX;
    gs.ball.y = f.startY;
    gs.ball.vx = 0;
    gs.ball.vy = 0;
    snapCamera();
    updateFloorLabel();
  } else if (gs.transDir === -1 && gs.transAlpha <= 0) {
    gs.transAlpha  = 0;
    gs.transitioning = false;
  }
}

function fmtTime(t) {
  const m = Math.floor(t / 60);
  const s = t - m * 60;
  return m + ':' + (s < 10 ? '0' : '') + s.toFixed(1);
}

let lastTimerText = '';
function updateTimerLabel() {
  const txt = fmtTime(gs ? gs.runTime : 0);
  if (txt === lastTimerText) return;
  lastTimerText = txt;
  document.getElementById('timer-label').textContent = txt;
}

function triggerEnd() {
  if (gs.ended) return;
  gs.ended   = true;
  gs.endFade = 0;

  // Run timer: record and compare against the stored best
  const t    = gs.runTime;
  const el   = document.getElementById('end-time');
  if (TEST_LEVEL) {              // test levels never touch the real best time
    el.textContent = `Test cleared: ${fmtTime(t)}`;
    return;
  }
  const best = parseFloat(localStorage.getItem('tmBestTime') || 'NaN');
  if (!(best <= t)) {            // first ever run, or beat the best
    localStorage.setItem('tmBestTime', String(t));
    el.textContent = isNaN(best)
      ? `Your time: ${fmtTime(t)}`
      : `New best time: ${fmtTime(t)}  (previous ${fmtTime(best)})`;
  } else {
    el.textContent = `Your time: ${fmtTime(t)}  ·  Best: ${fmtTime(best)}`;
  }
}

function updateEndFade(dt) {
  if (!gs.ended) return;
  gs.endFade = Math.min(1, gs.endFade + FADE_SPEED * dt);
  if (gs.endFade >= 1) {
    document.getElementById('end-screen').style.display = 'flex';
  }
}

// ── Camera ───────────────────────────────────────────────────────
// The camera is a world-space focus point that trails the ball; the
// iso projection centres the screen on it.
function snapCamera() {
  gs.camera.x = gs.ball.x;
  gs.camera.y = gs.ball.y;
}

function updateCamera(dt) {
  const t = 1 - Math.exp(-CONFIG.cameraSmoothing * dt);
  gs.camera.x += (gs.ball.x - gs.camera.x) * t;
  gs.camera.y += (gs.ball.y - gs.camera.y) * t;
}

// ── Drawing (isometric) ───────────────────────────────────────────

// Trace the projected quad of 4 world-space corners at height wz
function isoQuadPath(corners, wz) {
  const p0 = isoProject(corners[0][0], corners[0][1], wz);
  ctx.beginPath();
  ctx.moveTo(p0.x, p0.y);
  for (let i = 1; i < corners.length; i++) {
    const p = isoProject(corners[i][0], corners[i][1], wz);
    ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
}

// Project a world-space direction (not a point) to screen space
function dirToScreen(nx, ny) {
  const a  = viewAngle();
  const ca = Math.cos(a), sa = Math.sin(a);
  const rx = nx * ca - ny * sa;
  const ry = nx * sa + ny * ca;
  return { x: rx - ry, y: (rx + ry) * ISO_Y };
}

// Floor slab + tile grid
function drawFloorBase(floor) {
  const corners = [[0, 0], [floor.width, 0], [floor.width, floor.height], [0, floor.height]];

  // Slab side below the ground plane — floating-island depth
  isoQuadPath(corners, -26);
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fill();

  // Ground plane
  isoQuadPath(corners, 0);
  ctx.fillStyle = floor.tileColor;
  ctx.fill();

  // Special surface tiles (mud / ice / lava / pit)
  if (floor.tiles) {
    const ts   = CONFIG.tileSize;
    const time = gs ? gs.time : 0;
    for (const key in floor.tiles) {
      const ci = key.indexOf(',');
      const c  = +key.slice(0, ci), r = +key.slice(ci + 1);
      const x0 = c * ts, y0 = r * ts;
      const p  = isoProject(x0 + ts / 2, y0 + ts / 2, 0);
      if (p.x < -150 || p.x > W + 150 || p.y < -120 || p.y > H + 120) continue;

      const type = floor.tiles[key];
      isoQuadPath([[x0, y0], [x0 + ts, y0], [x0 + ts, y0 + ts], [x0, y0 + ts]], 0);
      if (type === 'mud1') {
        ctx.fillStyle = '#73583a';
      } else if (type === 'mud2') {
        ctx.fillStyle = '#5d452c';
      } else if (type === 'mud3') {
        ctx.fillStyle = '#44311d';
      } else if (type === 'ice') {
        ctx.fillStyle = '#a9cfdf';
      } else if (type === 'lava') {
        const g = 0.5 + 0.5 * Math.sin(time * 2.6 + c * 1.7 + r * 2.3);
        ctx.fillStyle = `rgb(${Math.round(185 + 55 * g)},${Math.round(48 + 62 * g)},12)`;
      } else {            // pit
        ctx.fillStyle = '#070707';
      }
      ctx.fill();

      if (type === 'ice') {
        // Sheen streak
        ctx.beginPath();
        const s1 = isoProject(x0 + ts * 0.2, y0 + ts * 0.55, 0);
        const s2 = isoProject(x0 + ts * 0.65, y0 + ts * 0.15, 0);
        ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y);
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth   = 2;
        ctx.stroke();
      } else if (type === 'lava') {
        // Bright molten core
        const g = 0.5 + 0.5 * Math.sin(time * 3.4 + c * 2.9 + r * 1.3);
        isoQuadPath([[x0 + ts * 0.3, y0 + ts * 0.3], [x0 + ts * 0.7, y0 + ts * 0.3],
                     [x0 + ts * 0.7, y0 + ts * 0.7], [x0 + ts * 0.3, y0 + ts * 0.7]], 0);
        ctx.fillStyle = `rgba(255,${Math.round(160 + 60 * g)},60,${(0.35 + 0.4 * g).toFixed(3)})`;
        ctx.fill();
      }
      // pit: surface filled black above; faces drawn after the floor grid
    }
  }

  // Tile grid along both world axes
  const ts = CONFIG.tileSize;
  ctx.strokeStyle = `rgba(${CONFIG.gridLineColor},${CONFIG.gridLineOpacity})`;
  ctx.lineWidth   = CONFIG.gridLineThickness;
  ctx.beginPath();
  for (let gx = 0; gx <= floor.width; gx += ts) {
    const a = isoProject(gx, 0, 0), b = isoProject(gx, floor.height, 0);
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
  }
  for (let gy = 0; gy <= floor.height; gy += ts) {
    const a = isoProject(0, gy, 0), b = isoProject(floor.width, gy, 0);
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
  }
  ctx.stroke();

  // Second pass for pit tiles: re-fill black (covers floor grid on surface)
  // then draw depth faces — no grid lines, pure void.
  if (floor.tiles) {
    const ts2   = CONFIG.tileSize;
    const cols2 = floor.width  / ts2;
    const rows2 = floor.height / ts2;
    const DEPTH = 56;
    for (const key in floor.tiles) {
      if (floor.tiles[key] !== 'pit') continue;
      const ci = key.indexOf(',');
      const c  = +key.slice(0, ci), r = +key.slice(ci + 1);
      const x0 = c * ts2, y0 = r * ts2;
      const p  = isoProject(x0 + ts2 / 2, y0 + ts2 / 2, 0);
      if (p.x < -150 || p.x > W + 150 || p.y < -120 || p.y > H + 120) continue;

      // Re-fill surface black (hides grid lines on pit tiles)
      isoQuadPath([[x0, y0], [x0 + ts2, y0], [x0 + ts2, y0 + ts2], [x0, y0 + ts2]], 0);
      ctx.fillStyle = '#070707';
      ctx.fill();

      // Depth faces on edges where a solid tile borders this pit tile
      const solid2 = (dc, dr) => {
        const c2 = c + dc, r2 = r + dr;
        if (c2 < 0 || r2 < 0 || c2 >= cols2 || r2 >= rows2) return false;
        return floor.tiles[c2 + ',' + r2] !== 'pit';
      };
      const faces = [
        { pts: [[x0, y0], [x0, y0 + ts2]],              test: solid2(-1, 0) }, // west
        { pts: [[x0 + ts2, y0], [x0 + ts2, y0 + ts2]], test: solid2(1,  0) }, // east
        { pts: [[x0, y0], [x0 + ts2, y0]],              test: solid2(0, -1) }, // north
        { pts: [[x0, y0 + ts2], [x0 + ts2, y0 + ts2]], test: solid2(0,  1) }, // south
      ];
      for (const e of faces) {
        if (!e.test) continue;
        const [wx0, wy0] = e.pts[0], [wx1, wy1] = e.pts[1];
        const tl = isoProject(wx0, wy0, 0),      tr = isoProject(wx1, wy1, 0);
        const bl = isoProject(wx0, wy0, -DEPTH), br = isoProject(wx1, wy1, -DEPTH);
        ctx.beginPath();
        ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
        ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
        ctx.closePath();
        ctx.fillStyle = '#0a0a0a';
        ctx.fill();
      }
    }
  }
}

// Solid box standing on the ground plane — walls, platforms, doors.
// Only the two camera-facing side faces are drawn, then the top.
function drawIsoBox(bx, by, bw, bh, hz, topColor, sideLight, sideDark, alpha = 1) {
  const c  = [[bx, by], [bx + bw, by], [bx + bw, by + bh], [bx, by + bh]];
  const pb = c.map(([x, y]) => isoProject(x, y, 0));

  // Cull fully off-screen boxes
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const p of pb) {
    if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
  }
  if (maxX < -40 || minX > W + 40 || maxY < -40 || minY - hz > H + 40) return;

  const pt = c.map(([x, y]) => isoProject(x, y, hz));
  ctx.save();
  ctx.globalAlpha = alpha;

  for (let i = 0; i < 4; i++) {
    const j = (i + 1) % 4;
    // Outward normal of this face; faces pointing toward the camera have n.y > 0
    const n = dirToScreen(c[j][1] - c[i][1], -(c[j][0] - c[i][0]));
    if (n.y <= 0.001) continue;
    ctx.beginPath();
    ctx.moveTo(pb[i].x, pb[i].y);
    ctx.lineTo(pb[j].x, pb[j].y);
    ctx.lineTo(pt[j].x, pt[j].y);
    ctx.lineTo(pt[i].x, pt[i].y);
    ctx.closePath();
    ctx.fillStyle = n.x >= 0 ? sideDark : sideLight;   // light source on the left
    ctx.fill();
  }

  isoQuadPath(c, hz);
  ctx.fillStyle = topColor;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth   = 1;
  ctx.stroke();
  ctx.restore();
}

// Split a long wall rect into short segments so painter's-algorithm
// depth sorting against the ball stays correct.
function wallSegments(rect) {
  const seg  = CONFIG.tileSize * 2;
  const segs = [];
  if (rect.w >= rect.h) {
    for (let sx = rect.x; sx < rect.x + rect.w; sx += seg)
      segs.push({ x: sx, y: rect.y, w: Math.min(seg, rect.x + rect.w - sx), h: rect.h });
  } else {
    for (let sy = rect.y; sy < rect.y + rect.h; sy += seg)
      segs.push({ x: rect.x, y: sy, w: rect.w, h: Math.min(seg, rect.y + rect.h - sy) });
  }
  return segs;
}

function drawHole(hole, locked) {
  const p = isoProject(hole.x, hole.y, 0);
  const r = hole.r;
  if (p.x + r * 2 < 0 || p.x - r * 2 > W || p.y + r * 2 < 0 || p.y - r * 2 > H) return;

  // Draw in a squashed local frame so circles become ground-plane ellipses
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.scale(1, ISO_Y);
  const hx = 0, hy = 0;

  // Recessed dark pit with radial gradient
  const grad = ctx.createRadialGradient(hx - r * 0.25, hy - r * 0.25, 1, hx, hy, r);
  grad.addColorStop(0,   '#161410');
  grad.addColorStop(0.5, '#0c0b09');
  grad.addColorStop(1,   '#000000');

  ctx.beginPath();
  ctx.arc(hx, hy, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Outer shadow rim (depth illusion)
  ctx.beginPath();
  ctx.arc(hx, hy, r + 3, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth   = 5;
  ctx.stroke();

  if (locked) {
    // Grate bars covering the pit
    ctx.save();
    ctx.beginPath();
    ctx.arc(hx, hy, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.strokeStyle = 'rgba(150,150,160,0.75)';
    ctx.lineWidth   = 4;
    ctx.beginPath();
    for (let off = -r; off <= r; off += r * 0.5) {
      ctx.moveTo(hx + off, hy - r);
      ctx.lineTo(hx + off, hy + r);
    }
    ctx.stroke();
    ctx.restore();

    // Red "locked" rim (pulsing)
    const pulse = 0.45 + 0.25 * Math.sin(Date.now() / 300);
    ctx.beginPath();
    ctx.arc(hx, hy, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,70,60,${pulse.toFixed(3)})`;
    ctx.lineWidth   = 2.5;
    ctx.stroke();
    ctx.restore();
    return;
  }

  // Gold/yellow warning rim
  ctx.beginPath();
  ctx.arc(hx, hy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,200,60,0.5)';
  ctx.lineWidth   = 2;
  ctx.stroke();

  // Tiny highlight dot (top-left)
  ctx.beginPath();
  ctx.arc(hx - r * 0.35, hy - r * 0.35, r * 0.18, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fill();
  ctx.restore();
}

// Trigger pad — circular floor plate; lights up green once activated
function drawTrigger(t, floor) {
  const fi = floor.index;
  const p  = isoProject(t.x, t.y, 0);
  if (p.x + t.r * 3 < 0 || p.x - t.r * 3 > W || p.y + t.r * 3 < 0 || p.y - t.r * 3 > H) return;
  const active = !!gs.activated[fi][t.id];
  const pulse  = 0.5 + 0.5 * Math.sin(Date.now() / 350);

  // Squashed local frame: circles render as ground-plane ellipses
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.scale(1, ISO_Y);
  const tx = 0, ty = 0;

  // Recessed plate base
  ctx.beginPath();
  ctx.arc(tx, ty, t.r, 0, Math.PI * 2);
  ctx.fillStyle = active ? 'rgba(40,90,55,0.95)' : 'rgba(0,0,0,0.30)';
  ctx.fill();

  if (active) {
    // Glow halo
    const glow = ctx.createRadialGradient(tx, ty, t.r * 0.4, tx, ty, t.r * 2.1);
    glow.addColorStop(0, 'rgba(90,255,140,0.30)');
    glow.addColorStop(1, 'rgba(90,255,140,0)');
    ctx.beginPath();
    ctx.arc(tx, ty, t.r * 2.1, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }

  // Ring
  ctx.beginPath();
  ctx.arc(tx, ty, t.r, 0, Math.PI * 2);
  ctx.strokeStyle = active
    ? 'rgba(110,255,160,0.95)'
    : `rgba(90,200,255,${(0.35 + pulse * 0.4).toFixed(3)})`;
  ctx.lineWidth = 3;
  ctx.stroke();

  // Inner ring detail
  ctx.beginPath();
  ctx.arc(tx, ty, t.r * 0.62, 0, Math.PI * 2);
  ctx.strokeStyle = active ? 'rgba(110,255,160,0.5)' : 'rgba(90,200,255,0.22)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();   // leave the squashed frame before text

  // Label — sequence floors show required order; others show a dot
  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  if (floor.requireSequence) {
    ctx.font      = 'bold 18px "Helvetica Neue", Helvetica, Arial, sans-serif';
    ctx.fillStyle = active ? 'rgba(220,255,230,0.95)' : 'rgba(255,255,255,0.55)';
    ctx.fillText(String(t.order + 1), p.x, p.y + 1);
  } else {
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, 5, 5 * ISO_Y, 0, 0, Math.PI * 2);
    ctx.fillStyle = active ? 'rgba(220,255,230,0.95)' : 'rgba(255,255,255,0.4)';
    ctx.fill();
  }
  ctx.restore();
}

// Door in the right perimeter wall, rendered as a box in the wall gap:
// full-height sealed slab when locked, low golden threshold when open.
function doorBoxRect(floor) {
  const wt = CONFIG.wallThickness;
  const d  = floor.door;
  return { x: floor.width - wt, y: d.center - d.width / 2, w: wt, h: d.width };
}

function drawDoorBox(floor, b, unlocked, alpha) {
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
  if (unlocked) {
    drawIsoBox(b.x, b.y, b.w, b.h, 6, '#ffe080', '#ffd24d', '#caa030', alpha);
    // Light spill onto the floor in front of the threshold
    ctx.save();
    ctx.globalAlpha = alpha * (0.25 + pulse * 0.1);
    isoQuadPath([[b.x - 70, b.y], [b.x, b.y], [b.x, b.y + b.h], [b.x - 70, b.y + b.h]], 0);
    ctx.fillStyle = 'rgba(255,230,80,0.5)';
    ctx.fill();
    ctx.restore();
  } else {
    drawIsoBox(b.x, b.y, b.w, b.h, CONFIG.wallHeight, '#3a1c20', '#552a30', '#2a1418', alpha);
  }
  // Billboard label above the door
  const p = isoProject(b.x + b.w / 2, b.y + b.h / 2, CONFIG.wallHeight + 16);
  ctx.save();
  ctx.globalAlpha  = alpha;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.font         = 'bold 11px "Helvetica Neue", Helvetica, Arial, sans-serif';
  ctx.fillStyle    = unlocked ? '#ffd84d' : `rgba(255,120,110,${(0.55 + pulse * 0.4).toFixed(3)})`;
  ctx.fillText(unlocked ? 'EXIT' : 'LOCKED', p.x, p.y);
  ctx.restore();
}
function drawFloor(floor) {
  drawFloorBase(floor);

  // Flat ground-level features
  const unlocked = exitUnlocked(floor.index);
  for (const t of (floor.triggers || [])) drawTrigger(t, floor);
  if (floor.hole) drawHole(floor.hole, !unlocked);
  (floor.bridges || []).forEach((b, i) => drawBridge(b, gs.bridgeUses[gs.floor][i]));
  drawBounceEffects();

  // Raised geometry, depth-sorted with the ball (painter's algorithm)
  const wt = CONFIG.wallThickness;
  const wh = CONFIG.wallHeight;
  const boxes = [];
  const pushWall = rect => {
    if (rect.w <= 0 || rect.h <= 0) return;
    for (const s of wallSegments(rect)) boxes.push({ ...s, hz: wh, kind: 'wall' });
  };

  // Perimeter (left/right walls inset so corners aren't double-drawn)
  pushWall({ x: 0, y: 0,                 w: floor.width, h: wt });
  pushWall({ x: 0, y: floor.height - wt, w: floor.width, h: wt });
  pushWall({ x: 0, y: wt, w: wt, h: floor.height - wt * 2 });
  if (floor.door && floor.door.wall === 'right') {
    const gapTop = floor.door.center - floor.door.width / 2;
    const gapBot = floor.door.center + floor.door.width / 2;
    pushWall({ x: floor.width - wt, y: wt,     w: wt, h: gapTop - wt });
    pushWall({ x: floor.width - wt, y: gapBot, w: wt, h: floor.height - wt - gapBot });
    boxes.push({ ...doorBoxRect(floor), hz: unlocked ? 6 : wh, kind: 'door' });
  } else {
    pushWall({ x: floor.width - wt, y: wt, w: wt, h: floor.height - wt * 2 });
  }
  floor.innerWalls.forEach((iw, i) => {
    if (iw.material === 'brick') {
      const hp = gs.wallHp[gs.floor][i];
      if (hp <= 0) boxes.push({ x: iw.x, y: iw.y, w: iw.w, h: iw.h, hz: 7, kind: 'rubble' });
      else         boxes.push({ x: iw.x, y: iw.y, w: iw.w, h: iw.h, hz: wh, kind: 'brick', hp });
      return;
    }
    pushWall(iw);
  });
  for (const d of (floor.doors || [])) {
    const st   = doorState(d);
    const open = d.type === 'oneway' ? true
               : d.type === 'onetime' ? !st.used
               : gs.time <= st.openUntil;
    boxes.push({ x: d.x, y: d.y, w: d.w, h: d.h, hz: open ? 7 : wh, kind: 'innerdoor', d, open });
    // Unlock pads for two-way doors live on the floor plane
    if (d.type === 'twoway') drawDoorPads(d, open);
  }
  for (const ps of (floor.platformStructures || []))
    boxes.push({ x: ps.x, y: ps.y, w: ps.w, h: ps.h, hz: CONFIG.platformHeight, kind: 'platform' });
  for (const m of (floor.movers || []))
    boxes.push({ x: m.cx, y: m.cy, w: m.w, h: m.h, hz: 10, kind: 'mover' });
  for (const L of (floor.launchers || []))
    boxes.push({ x: L.x, y: L.y, w: L.w, h: L.h, hz: 26, kind: 'launcher', L });
  for (const sw of (floor.launcherSwitches || []))
    boxes.push({ x: sw.x, y: sw.y, w: sw.w, h: sw.h, hz: 4, kind: 'lswitch', sw });
  for (const rp of (floor.ramps || []))
    boxes.push({ x: rp.x, y: rp.y, w: rp.w, h: rp.h, hz: 24, kind: 'ramp', rp });
  (floor.bridges || []).forEach((b, i) => {
    if (gs.bridgeUses[gs.floor][i] <= 0) return;
    // Sign posts with the remaining-crossings count at each end
    const horiz = b.w >= b.h;
    const posts = horiz
      ? [{ x: b.x - 10,      y: b.y - 18 }, { x: b.x + b.w - 4, y: b.y - 18 }]
      : [{ x: b.x - 18,      y: b.y - 10 }, { x: b.x - 18,      y: b.y + b.h - 4 }];
    for (const p of posts)
      boxes.push({ x: p.x, y: p.y, w: 14, h: 14, hz: 30, kind: 'post', count: gs.bridgeUses[gs.floor][i] });
  });
  for (const p of (floor.pickups || [])) {
    if (gs.collected[gs.floor][p.id]) continue;
    boxes.push({ x: p.x - 12, y: p.y - 12, w: 24, h: 24, hz: 0, kind: 'pickup', p });
  }

  const ball      = gs.ball;
  const ballDepth = isoDepth(ball.x, ball.y);
  const ballP     = isoProject(ball.x, ball.y, 0);

  const items = boxes.map(b => ({ depth: isoDepth(b.x + b.w / 2, b.y + b.h / 2), box: b }));
  items.push({ depth: ballDepth, ball: true });
  items.sort((a, b) => a.depth - b.depth);

  for (const it of items) {
    if (it.ball) { drawBall(ball); continue; }
    const b = it.box;

    // Soften geometry that stands between the camera and the ball
    let alpha = 1;
    if (it.depth > ballDepth) {
      const bp = isoProject(b.x + b.w / 2, b.y + b.h / 2, 0);
      if (Math.abs(bp.x - ballP.x) < (b.w + b.h) / 2 + 60 &&
          bp.y > ballP.y - 24 && bp.y < ballP.y + b.hz + 90) alpha = 0.45;
    }

    if (b.kind === 'door') {
      drawDoorBox(floor, b, unlocked, alpha);
    } else if (b.kind === 'platform') {
      drawIsoBox(b.x, b.y, b.w, b.h, b.hz, '#5d5848', floor.wallHighlight, floor.wallShadow, alpha);
    } else if (b.kind === 'mover') {
      drawIsoBox(b.x, b.y, b.w, b.h, b.hz, '#4a4a52', '#5e5e68', '#2c2c32', alpha);
    } else if (b.kind === 'brick') {
      drawIsoBox(b.x, b.y, b.w, b.h, b.hz, '#9a5742', '#b87a60', '#5a2e22', alpha);
      if (b.hp < 3) drawBrickCracks(b, alpha);
    } else if (b.kind === 'rubble') {
      drawIsoBox(b.x, b.y, b.w, b.h, b.hz, '#4a3328', '#5d4233', '#2a1c15', alpha);
    } else if (b.kind === 'innerdoor') {
      drawInnerDoor(b, alpha);
    } else if (b.kind === 'launcher') {
      drawLauncher(b.L, alpha);
    } else if (b.kind === 'lswitch') {
      drawLauncherSwitch(b.sw, floor, alpha);
    } else if (b.kind === 'ramp') {
      drawRamp(b.rp, alpha);
    } else if (b.kind === 'post') {
      drawIsoBox(b.x, b.y, b.w, b.h, b.hz, '#8a6a40', '#a8865a', '#503a22', alpha);
      const tp = isoProject(b.x + b.w / 2, b.y + b.h / 2, b.hz + 12);
      ctx.save();
      ctx.globalAlpha  = alpha;
      ctx.font         = 'bold 12px "Helvetica Neue", Helvetica, Arial, sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#ffe6a8';
      ctx.fillText(String(b.count), tp.x, tp.y);
      ctx.restore();
    } else if (b.kind === 'pickup') {
      drawPickup(b.p);
    } else {
      drawIsoBox(b.x, b.y, b.w, b.h, b.hz, floor.wallColor, floor.wallHighlight, floor.wallShadow, alpha);
    }
  }
}

// Fracture lines on a damaged brick wall (deterministic per wall position)
function drawBrickCracks(b, alpha) {
  const cracks = b.hp === 2 ? 2 : 4;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = 'rgba(20,8,4,0.85)';
  ctx.lineWidth   = 1.5;
  for (let n = 0; n < cracks; n++) {
    // Cheap seeded pseudo-random from wall position + crack index
    const seed = (s) => { const v = Math.sin(b.x * 12.9898 + b.y * 78.233 + n * 37.719 + s * 9.7) * 43758.5453; return v - Math.floor(v); };
    let wx = b.x + seed(1) * b.w;
    let wy = b.y + seed(2) * b.h;
    ctx.beginPath();
    let p = isoProject(wx, wy, b.hz);
    ctx.moveTo(p.x, p.y);
    for (let s2 = 0; s2 < 3; s2++) {
      wx += (seed(3 + s2) - 0.5) * Math.max(b.w, 40);
      wy += (seed(6 + s2) - 0.5) * Math.max(b.h, 40);
      wx = Math.max(b.x, Math.min(wx, b.x + b.w));
      wy = Math.max(b.y, Math.min(wy, b.y + b.h));
      // Cracks run down the wall face as well as across the top
      const z = b.hz * Math.max(0, 1 - s2 * 0.45);
      p = isoProject(wx, wy, z);
      ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// Flat unlock pads either side of a two-way door
function drawDoorPads(d, open) {
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 320);
  for (const pad of doorPads(d)) {
    const p = isoProject(pad.x, pad.y, 0);
    if (p.x < -60 || p.x > W + 60 || p.y < -60 || p.y > H + 60) continue;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, 26, 26 * ISO_Y, 0, 0, Math.PI * 2);
    ctx.fillStyle = open ? 'rgba(60,160,90,0.7)' : 'rgba(20,40,60,0.7)';
    ctx.fill();
    ctx.strokeStyle = open
      ? 'rgba(120,255,170,0.9)'
      : `rgba(90,200,255,${(0.4 + pulse * 0.4).toFixed(3)})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// Doors set into inner walls: one-way / two-way (unlock each time) / one-time
function drawInnerDoor(b, alpha) {
  const d = b.d;
  const COLORS = {
    oneway:  ['#3f8f55', '#5cb076', '#235934'],
    twoway:  ['#3a5f8a', '#5a82b0', '#1f3a58'],
    onetime: ['#7a5a9a', '#9a7cba', '#4a3262'],
  };
  let cols = COLORS[d.type];
  if (d.type === 'onetime' && !b.open) cols = ['#3a3142', '#4a4054', '#241e2c'];   // sealed
  drawIsoBox(b.x, b.y, b.w, b.h, b.hz, cols[0], cols[1], cols[2], alpha);

  ctx.save();
  ctx.globalAlpha = alpha;

  if (d.type === 'oneway') {
    // Arrow on the threshold showing the allowed direction
    const cx = d.x + d.w / 2, cy = d.y + d.h / 2;
    const L = 26, Wd = 16;
    const tip  = isoProject(cx + d.dir.x * L, cy + d.dir.y * L, b.hz + 1);
    const w1   = isoProject(cx - d.dir.x * L * 0.4 + d.dir.y * Wd, cy - d.dir.y * L * 0.4 + d.dir.x * Wd, b.hz + 1);
    const w2   = isoProject(cx - d.dir.x * L * 0.4 - d.dir.y * Wd, cy - d.dir.y * L * 0.4 - d.dir.x * Wd, b.hz + 1);
    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y); ctx.lineTo(w1.x, w1.y); ctx.lineTo(w2.x, w2.y);
    ctx.closePath();
    ctx.fillStyle = 'rgba(235,255,240,0.92)';
    ctx.fill();
  }

  // Billboard label
  const label = d.type === 'oneway'  ? 'ONE WAY'
              : d.type === 'twoway'  ? (b.open ? 'OPEN' : 'UNLOCK')
              : (b.open ? 'ONE USE' : 'SEALED');
  const p = isoProject(d.x + d.w / 2, d.y + d.h / 2, CONFIG.wallHeight + 16);
  ctx.font         = 'bold 10px "Helvetica Neue", Helvetica, Arial, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle    = b.open ? 'rgba(220,255,230,0.85)' : 'rgba(255,200,180,0.8)';
  ctx.fillText(label, p.x, p.y);
  ctx.restore();
}

// Wooden bridge planks, drawn flat on the floor plane with wear stages
function drawBridge(b, usesLeft) {
  if (usesLeft <= 0) return;
  const c = isoProject(b.x + b.w / 2, b.y + b.h / 2, 0);
  if (c.x < -400 || c.x > W + 400 || c.y < -300 || c.y > H + 300) return;
  const wear = b.uses - usesLeft;   // 0 fresh … uses-1 nearly gone

  isoQuadPath([[b.x, b.y], [b.x + b.w, b.y], [b.x + b.w, b.y + b.h], [b.x, b.y + b.h]], 2);
  ctx.fillStyle = wear === 0 ? '#8a6a40' : wear === 1 ? '#7a5c36' : '#694e2e';
  ctx.fill();
  ctx.strokeStyle = 'rgba(40,26,12,0.8)';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // Planks across the short axis
  const horiz = b.w >= b.h;
  const span  = horiz ? b.w : b.h;
  const step  = 18;
  ctx.strokeStyle = 'rgba(40,26,12,0.55)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  for (let s2 = step; s2 < span; s2 += step) {
    const a = horiz ? isoProject(b.x + s2, b.y, 2)       : isoProject(b.x, b.y + s2, 2);
    const d = horiz ? isoProject(b.x + s2, b.y + b.h, 2) : isoProject(b.x + b.w, b.y + s2, 2);
    ctx.moveTo(a.x, a.y); ctx.lineTo(d.x, d.y);
  }
  ctx.stroke();

  // Wear: cracks appear as the bridge weakens
  if (wear >= 1) {
    ctx.strokeStyle = 'rgba(15,8,4,0.7)';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    for (let n = 0; n < wear * 3; n++) {
      const fx2 = b.x + ((n * 73) % 90) / 90 * b.w;
      const fy2 = b.y + ((n * 41) % 70) / 70 * b.h;
      const p1 = isoProject(fx2, fy2, 2);
      const p2 = isoProject(fx2 + 24, fy2 + 14, 2);
      ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    }
    ctx.stroke();
  }
}

// Soft ground glow shown while the ball's magnet is dragging an object
function drawMagnetGlow(o, alpha) {
  if (gs.time - (o._magT || -9) > 0.2) return;
  const p   = isoProject(o.x + o.w / 2, o.y + o.h / 2, 0);
  const rad = (o.w + o.h) * 0.62;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.scale(1, ISO_Y);
  const g = ctx.createRadialGradient(0, 0, rad * 0.2, 0, 0, rad);
  g.addColorStop(0, `rgba(110,200,255,${(0.35 * alpha).toFixed(3)})`);
  g.addColorStop(1, 'rgba(110,200,255,0)');
  ctx.beginPath();
  ctx.arc(0, 0, rad, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.restore();
}

// Pushable spring launcher: metal box, spring plate on its active face.
// Off (pushable, inert): orange arrow, yellow plate. On: both green, plate fires.
function drawLauncher(L, alpha) {
  drawMagnetGlow(L, alpha);
  drawIsoBox(L.x, L.y, L.w, L.h, 26, '#70707c', '#8c8c9a', '#42424c', alpha);

  // Spring plate slides out briefly when fired
  const since = gs.time - L.springT;
  const off   = since < 0.25 ? Math.sin(since / 0.25 * Math.PI) * 22 : 0;
  const f     = L.facing;
  const px0 = f.x > 0 ? L.x + L.w + off : f.x < 0 ? L.x - 6 - off : L.x;
  const py0 = f.y > 0 ? L.y + L.h + off : f.y < 0 ? L.y - 6 - off : L.y;
  const pw  = f.x !== 0 ? 6 : L.w;
  const ph  = f.y !== 0 ? 6 : L.h;
  if (L.on) drawIsoBox(px0, py0, pw, ph, 22, '#3cb868', '#66dc92', '#1e7038', alpha);
  else      drawIsoBox(px0, py0, pw, ph, 22, '#e0b030', '#f0cc60', '#9a7618', alpha);

  // Chevron on top showing the launch direction
  ctx.save();
  ctx.globalAlpha = alpha;
  const cx = L.x + L.w / 2, cy = L.y + L.h / 2;
  const tip = isoProject(cx + f.x * 20, cy + f.y * 20, 27);
  const w1  = isoProject(cx - f.x * 8 + f.y * 12, cy - f.y * 8 + f.x * 12, 27);
  const w2  = isoProject(cx - f.x * 8 - f.y * 12, cy - f.y * 8 - f.x * 12, 27);
  ctx.beginPath();
  ctx.moveTo(tip.x, tip.y); ctx.lineTo(w1.x, w1.y); ctx.lineTo(w2.x, w2.y);
  ctx.closePath();
  ctx.fillStyle = L.on ? '#46d674' : '#e8842a';
  ctx.fill();

  // Power number: squares the ball flies after leaving a ramp
  const np = isoProject(cx - f.x * 18, cy - f.y * 18, 27);
  ctx.font         = 'bold 22px "Helvetica Neue", Helvetica, Arial, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle    = L.on ? '#bfffd4' : '#ffd9a8';
  ctx.fillText(String(L.power), np.x, np.y);
  ctx.restore();
}

// Launcher activation switch: squat pedestal with an indicator dome.
// Orange while the floor's launchers are off; green once powered.
function drawLauncherSwitch(sw, floor, alpha) {
  const on = (floor.launchers || []).length > 0 && floor.launchers.every(L => L.on);
  drawIsoBox(sw.x, sw.y, sw.w, sw.h, 4, '#565660', '#6e6e7a', '#34343c', alpha);
  const cx = sw.x + sw.w / 2, cy = sw.y + sw.h / 2;
  const p  = isoProject(cx, cy, 5);
  const pulse = on ? 1 : 0.55 + 0.45 * Math.sin(Date.now() / 300);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.ellipse(p.x, p.y, sw.w * 0.28, sw.w * 0.28 * ISO_Y, 0, 0, Math.PI * 2);
  ctx.fillStyle = on ? '#46d674' : `rgba(232,132,42,${pulse.toFixed(3)})`;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth   = 1.5;
  ctx.stroke();
  ctx.restore();
}

// Ramp: wedge rising toward its launch direction
function drawRamp(rp, alpha) {
  drawMagnetGlow(rp, alpha);
  const { x, y, w, h } = rp;
  const d  = rp.dir;
  const HZ = 24;
  // Height of each corner: 0 at the entry edge, HZ at the take-off edge
  const hAt = (cx, cy) => {
    const t = d.x !== 0 ? (cx - x) / w : (cy - y) / h;
    const k = (d.x + d.y) > 0 ? t : 1 - t;
    return k * HZ;
  };
  const corners = [[x, y], [x + w, y], [x + w, y + h], [x, y + h]];
  ctx.save();
  ctx.globalAlpha = alpha;

  // Support face under the high edge
  const hi = corners.filter(([cx, cy]) => hAt(cx, cy) > 1);
  if (hi.length === 2) {
    const a0 = isoProject(hi[0][0], hi[0][1], 0);
    const a1 = isoProject(hi[1][0], hi[1][1], 0);
    const b0 = isoProject(hi[0][0], hi[0][1], HZ);
    const b1 = isoProject(hi[1][0], hi[1][1], HZ);
    ctx.beginPath();
    ctx.moveTo(a0.x, a0.y); ctx.lineTo(a1.x, a1.y);
    ctx.lineTo(b1.x, b1.y); ctx.lineTo(b0.x, b0.y);
    ctx.closePath();
    ctx.fillStyle = '#4a5638';
    ctx.fill();
  }

  // Sloped top surface
  ctx.beginPath();
  corners.forEach(([cx, cy], i) => {
    const p = isoProject(cx, cy, hAt(cx, cy));
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  });
  ctx.closePath();
  ctx.fillStyle = '#7c8a5a';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth   = 1;
  ctx.stroke();

  // Direction chevrons up the slope
  ctx.fillStyle = 'rgba(240,248,220,0.7)';
  for (let n = 1; n <= 2; n++) {
    const cx = x + w / 2 + d.x * (n * 14 - 14), cy = y + h / 2 + d.y * (n * 14 - 14);
    const z  = hAt(cx, cy) + 1;
    const tip = isoProject(cx + d.x * 10, cy + d.y * 10, z);
    const w1  = isoProject(cx - d.x * 4 + d.y * 9, cy - d.y * 4 + d.x * 9, z);
    const w2  = isoProject(cx - d.x * 4 - d.y * 9, cy - d.y * 4 - d.x * 9, z);
    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y); ctx.lineTo(w1.x, w1.y); ctx.lineTo(w2.x, w2.y);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// Stronger Ball pickup — floating golden orb over a pulsing ring
function drawMagnetPickup(p) {
  const sp = isoProject(p.x, p.y, 0);
  if (sp.x < -60 || sp.x > W + 60 || sp.y < -60 || sp.y > H + 60) return;
  const active = gs.time < (gs.magnetUntil || 0);
  const pulse  = 0.5 + 0.5 * Math.sin(gs.time * 3);
  const bob    = Math.sin(gs.time * 2.2) * 5;
  const bx = sp.x, by = sp.y - 28 - bob;

  // Orbit ring on ground plane
  ctx.save();
  ctx.translate(sp.x, sp.y);
  ctx.scale(1, ISO_Y);
  ctx.beginPath();
  ctx.arc(0, 0, 24 + pulse * 5, 0, Math.PI * 2);
  ctx.strokeStyle = active
    ? `rgba(100,220,255,${(0.35 + pulse * 0.35).toFixed(3)})`
    : `rgba(200,100,255,${(0.35 + pulse * 0.35).toFixed(3)})`;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  // Horseshoe shape (U + two prong tips)
  ctx.save();
  const col = active ? '#64dcff' : '#cc66ff';
  const hi  = active ? '#c0f6ff' : '#f0b0ff';
  const sh  = active ? '#1a6080' : '#5a1880';
  ctx.strokeStyle = col;
  ctx.lineWidth   = 5;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.arc(bx, by, 10, Math.PI, 0, false);  // top arch
  ctx.stroke();
  // Left prong
  ctx.beginPath(); ctx.moveTo(bx - 10, by); ctx.lineTo(bx - 10, by + 9); ctx.stroke();
  // Right prong
  ctx.beginPath(); ctx.moveTo(bx + 10, by); ctx.lineTo(bx + 10, by + 9); ctx.stroke();
  // Prong tips in contrasting colour (the poles)
  ctx.strokeStyle = hi;
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(bx - 10, by + 6); ctx.lineTo(bx - 10, by + 9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx + 10, by + 6); ctx.lineTo(bx + 10, by + 9); ctx.stroke();
  ctx.restore();

  // Timer arc shows how much charge is left while active
  if (active) {
    const frac = Math.max(0, (gs.magnetUntil - gs.time) / CONFIG.magnetDuration);
    ctx.save();
    ctx.beginPath();
    ctx.arc(bx, by, 16, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2, false);
    ctx.strokeStyle = 'rgba(100,220,255,0.6)';
    ctx.lineWidth   = 2.5;
    ctx.stroke();
    ctx.restore();
  }
}

function drawPickup(p) {
  if (p.type === 'magnet') { drawMagnetPickup(p); return; }
  const sp = isoProject(p.x, p.y, 0);
  if (sp.x < -60 || sp.x > W + 60 || sp.y < -60 || sp.y > H + 60) return;
  const pulse = 0.5 + 0.5 * Math.sin(gs.time * 3);
  const bob   = Math.sin(gs.time * 2.2) * 4;

  ctx.beginPath();
  ctx.ellipse(sp.x, sp.y, 22 + pulse * 5, (22 + pulse * 5) * ISO_Y, 0, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,200,80,${(0.35 + pulse * 0.35).toFixed(3)})`;
  ctx.lineWidth   = 2;
  ctx.stroke();

  const oy = sp.y - 22 - bob;
  const grad = ctx.createRadialGradient(sp.x - 3, oy - 4, 0, sp.x, oy, 11);
  grad.addColorStop(0, '#fff3c8');
  grad.addColorStop(0.5, '#ffce50');
  grad.addColorStop(1, '#a87410');
  ctx.beginPath();
  ctx.arc(sp.x, oy, 11, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
}

function drawBall(ball) {
  if (gs.dying) { drawDyingBall(); return; }
  const r = CONFIG.ballRadius;
  const g = isoProject(ball.x, ball.y, 0);
  if (g.x < -60 || g.x > W + 60 || g.y < -60 || g.y > H + 60) return;

  // Ground shadow stays on the floor plane even when the ball is airborne
  ctx.beginPath();
  ctx.ellipse(g.x, g.y, r * 0.85, r * 0.85 * ISO_Y, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.fill();

  // Sphere centre floats ball-radius above its ground point (+ jump height)
  const bx = g.x;
  const by = g.y - r * 0.9 - (ball.z || 0);

  // Magnet aura — blue-cyan glow, pulses faster when nearly expired
  if (gs.time < (gs.magnetUntil || 0)) {
    const secsLeft = gs.magnetUntil - gs.time;
    const rate  = secsLeft < 5 ? 12 : 5;   // pulse quickens in final 5 s
    const pulse = 0.5 + 0.5 * Math.sin(gs.time * rate);
    const aura  = ctx.createRadialGradient(bx, by, r * 0.6, bx, by, r * 2.2);
    aura.addColorStop(0, `rgba(80,200,255,${(0.30 + pulse * 0.25).toFixed(3)})`);
    aura.addColorStop(1, 'rgba(80,200,255,0)');
    ctx.beginPath();
    ctx.arc(bx, by, r * 2.2, 0, Math.PI * 2);
    ctx.fillStyle = aura;
    ctx.fill();
  }

  // Stronger Ball aura
  if (gs.strongBall) {
    const pulse = 0.5 + 0.5 * Math.sin(gs.time * 5);
    const aura = ctx.createRadialGradient(bx, by, r * 0.6, bx, by, r * 2);
    aura.addColorStop(0, `rgba(255,190,60,${(0.30 + pulse * 0.2).toFixed(3)})`);
    aura.addColorStop(1, 'rgba(255,190,60,0)');
    ctx.beginPath();
    ctx.arc(bx, by, r * 2, 0, Math.PI * 2);
    ctx.fillStyle = aura;
    ctx.fill();
  }

  // Ball body — warm off-white marble gradient
  const body = ctx.createRadialGradient(bx - r * 0.32, by - r * 0.32, 0, bx, by, r);
  body.addColorStop(0,    '#e8e2d4');
  body.addColorStop(0.35, '#cfc6af');
  body.addColorStop(0.72, '#a09070');
  body.addColorStop(1,    '#5a5040');

  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI * 2);
  ctx.fillStyle = body;
  ctx.fill();

  // Bright specular highlight (top-left catch light)
  const spec = ctx.createRadialGradient(bx - r * 0.28, by - r * 0.38, 0, bx - r * 0.15, by - r * 0.15, r * 0.6);
  spec.addColorStop(0,   'rgba(255,255,255,0.92)');
  spec.addColorStop(0.35,'rgba(255,255,255,0.35)');
  spec.addColorStop(1,   'rgba(255,255,255,0)');

  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI * 2);
  ctx.fillStyle = spec;
  ctx.fill();

  // Thin rim
  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth   = 1;
  ctx.stroke();
}

// Death animation: pit = sink & shrink into the dark; lava = flash, then ash pile
function drawDyingBall() {
  const d = gs.dying;
  const r = CONFIG.ballRadius;
  const g = isoProject(d.x, d.y, 0);
  const k = Math.min(1, d.t / 0.9);   // 0 → 1 over the animation

  if (d.type === 'pit') {
    const scale = 1 - k;
    if (scale <= 0.02) return;
    const by = g.y - r * 0.9 * scale + k * 26;   // sinks below the floor plane
    ctx.save();
    ctx.globalAlpha = 1 - k * 0.85;
    const body = ctx.createRadialGradient(g.x - r * 0.3 * scale, by - r * 0.3 * scale, 0, g.x, by, r * scale);
    body.addColorStop(0, '#9a9284');
    body.addColorStop(1, '#1c1812');
    ctx.beginPath();
    ctx.arc(g.x, by, r * scale, 0, Math.PI * 2);
    ctx.fillStyle = body;
    ctx.fill();
    ctx.restore();
    return;
  }

  // Lava
  if (k < 0.35) {
    // White-hot flash before the marble is consumed
    const flash = 1 - k / 0.35;
    const by = g.y - r * 0.9;
    ctx.beginPath();
    ctx.arc(g.x, by, r * (1 + (1 - flash) * 0.4), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,${Math.round(140 + flash * 115)},${Math.round(60 + flash * 195)},0.95)`;
    ctx.fill();
  } else {
    // Small pile of black ash
    const grow = Math.min(1, (k - 0.35) / 0.3);
    ctx.beginPath();
    ctx.ellipse(g.x, g.y, r * 1.05 * grow, r * 0.45 * grow * ISO_Y * 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#15120e';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(g.x, g.y - 3 * grow, r * 0.55 * grow, r * 0.3 * grow, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#0b0908';
    ctx.fill();
    // Fading embers in the pile
    const ember = Math.max(0, 1 - (d.t - 0.65) / 0.8);
    if (ember > 0) {
      for (let i = 0; i < 3; i++) {
        const ex = g.x + Math.sin(i * 2.4 + 1) * r * 0.4;
        const ey = g.y - 2 + Math.cos(i * 1.7) * r * 0.15;
        ctx.beginPath();
        ctx.arc(ex, ey, 1.6, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,120,40,${(ember * (0.5 + 0.5 * Math.sin(gs.time * 9 + i * 2))).toFixed(3)})`;
        ctx.fill();
      }
    }
  }
}

function drawJoystickHUD() {
  if (!joy.active) return;

  const bx  = joy.baseX;
  const by  = joy.baseY;
  const MAX = CONFIG.joystickRadius;
  const hx  = bx + joy.dx * MAX;
  const hy  = by + joy.dy * MAX;
  const mag = Math.hypot(joy.dx, joy.dy);

  // Max-range ring (shows input boundary)
  ctx.beginPath();
  ctx.arc(bx, by, MAX, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth   = 1;
  ctx.stroke();

  // Line from anchor to handle
  if (mag > 0.05) {
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(hx, hy);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
  }

  // Anchor dot
  ctx.beginPath();
  ctx.arc(bx, by, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.fill();

  // Handle dot (brightens with deflection magnitude)
  ctx.beginPath();
  ctx.arc(hx, hy, 13, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,${(0.22 + mag * 0.18).toFixed(2)})`;
  ctx.fill();
  ctx.strokeStyle = `rgba(255,255,255,${(0.35 + mag * 0.25).toFixed(2)})`;
  ctx.lineWidth   = 1.5;
  ctx.stroke();
}

function drawPauseHUD() {
  const { cx, cy, r } = PAUSE_GFX;
  const paused = gs && gs.paused;

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle   = paused ? 'rgba(255,185,0,0.30)' : 'rgba(255,255,255,0.09)';
  ctx.fill();
  ctx.strokeStyle = paused ? 'rgba(255,185,0,0.75)' : 'rgba(255,255,255,0.22)';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  ctx.fillStyle    = paused ? '#ffb800' : 'rgba(255,255,255,0.65)';
  ctx.font         = 'bold 10px "Helvetica Neue", Helvetica, Arial, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(paused ? 'GO' : 'HOLD', cx, cy);
  ctx.textBaseline = 'alphabetic';
}

function toggleMap() {
  if (!gs || gs.ended) return;
  gs.mapOpen = !gs.mapOpen;
  const btn = document.getElementById('map-btn');
  btn.textContent = gs.mapOpen ? 'RESUME' : 'MAP';
  btn.classList.toggle('open', gs.mapOpen);
}

function drawMapOverlay(alpha) {
  const floor  = floors[gs.floor];
  const PAD    = 28;
  const HDR    = 44;   // header height (title)
  const LEG    = 32;   // legend height below map

  const availW = W - PAD * 2;
  const availH = H - PAD * 2 - HDR - LEG;
  const scale  = Math.min(availW / floor.width, availH / floor.height);

  const mapW = floor.width  * scale;
  const mapH = floor.height * scale;
  const mapX = Math.round((W - mapW) / 2);
  const mapY = Math.round(PAD + HDR);
  const wt   = Math.max(2, CONFIG.wallThickness * scale);

  ctx.save();
  ctx.globalAlpha = alpha;

  // Dark scrim
  ctx.fillStyle = 'rgba(0,0,0,0.86)';
  ctx.fillRect(0, 0, W, H);

  // Panel background
  ctx.fillStyle = 'rgba(18,20,28,0.97)';
  ctx.fillRect(mapX - 10, mapY - 10, mapW + 20, mapH + 20 + LEG);

  // Floor field
  ctx.fillStyle = floor.tileColor;
  ctx.fillRect(mapX, mapY, mapW, mapH);

  // Subtle tile grid on map
  ctx.strokeStyle = floor.tileLineColor;
  ctx.lineWidth   = 0.5;
  const gridStep = Math.round(CONFIG.tileSize * scale);
  if (gridStep > 4) {
    ctx.beginPath();
    for (let gx = mapX; gx <= mapX + mapW; gx += gridStep) {
      ctx.moveTo(gx, mapY); ctx.lineTo(gx, mapY + mapH);
    }
    for (let gy = mapY; gy <= mapY + mapH; gy += gridStep) {
      ctx.moveTo(mapX, gy); ctx.lineTo(mapX + mapW, gy);
    }
    ctx.stroke();
  }

  // Walls — helper to fill a wall rect
  function mwall(wx, wy, ww, wh) {
    ctx.fillStyle = floor.wallColor;
    ctx.fillRect(mapX + wx * scale, mapY + wy * scale, ww * scale, wh * scale);
  }
  const fw = floor.width, fh = floor.height, WT = CONFIG.wallThickness;
  const unlocked = exitUnlocked(gs.floor);
  mwall(0, 0, fw, WT);                    // top
  mwall(0, fh - WT, fw, WT);             // bottom
  mwall(0, 0, WT, fh);                   // left
  if (floor.door && floor.door.wall === 'right') {
    const gapTop = floor.door.center - floor.door.width / 2;
    const gapBot = floor.door.center + floor.door.width / 2;
    mwall(fw - WT, 0,      WT, gapTop);
    mwall(fw - WT, gapBot, WT, fh - gapBot);
    // Door gap highlight — gold when open, red when sealed
    ctx.fillStyle = unlocked ? '#ffcc22' : '#cc3333';
    ctx.fillRect(mapX + (fw - WT) * scale, mapY + gapTop * scale,
                 Math.max(wt, 3), (gapBot - gapTop) * scale);
  } else {
    mwall(fw - WT, 0, WT, fh);           // right (solid)
  }

  // Surface tiles (under walls/triggers so hazards read clearly)
  if (floor.tiles) {
    const ts = CONFIG.tileSize;
    const TILE_COLORS = { mud1: '#73583a', mud2: '#5d452c', mud3: '#44311d', ice: '#a9cfdf', lava: '#d04812', pit: '#000000' };
    for (const key in floor.tiles) {
      const ci = key.indexOf(',');
      const c  = +key.slice(0, ci), r = +key.slice(ci + 1);
      ctx.fillStyle = TILE_COLORS[floor.tiles[key]];
      ctx.fillRect(mapX + c * ts * scale, mapY + r * ts * scale, ts * scale + 0.5, ts * scale + 0.5);
    }
  }

  // Moving platforms — track line + current position
  for (const m of (floor.movers || [])) {
    ctx.strokeStyle = 'rgba(170,170,190,0.4)';
    ctx.lineWidth   = 1;
    ctx.setLineDash([2, 2]);
    ctx.beginPath();
    ctx.moveTo(mapX + (m.x1 + m.w / 2) * scale, mapY + (m.y1 + m.h / 2) * scale);
    ctx.lineTo(mapX + (m.x2 + m.w / 2) * scale, mapY + (m.y2 + m.h / 2) * scale);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#4a4a52';
    ctx.strokeStyle = 'rgba(200,200,215,0.8)';
    ctx.fillRect(mapX + m.cx * scale, mapY + m.cy * scale, m.w * scale, m.h * scale);
    ctx.strokeRect(mapX + m.cx * scale, mapY + m.cy * scale, m.w * scale, m.h * scale);
  }

  // Inner maze walls (brick shown in its own colour, breached bricks as gaps)
  floor.innerWalls.forEach((iw, i) => {
    if (iw.material === 'brick') {
      if (gs.wallHp[gs.floor][i] <= 0) return;
      ctx.fillStyle = '#9a5742';
      ctx.fillRect(mapX + iw.x * scale, mapY + iw.y * scale, iw.w * scale, iw.h * scale);
      return;
    }
    mwall(iw.x, iw.y, iw.w, iw.h);
  });

  // Inner doors
  const DOOR_MAP_COLORS = { oneway: '#4fbf6f', twoway: '#5a8fd0', onetime: '#a87cd8' };
  for (const d of (floor.doors || [])) {
    const st = doorState(d);
    ctx.fillStyle = (d.type === 'onetime' && st.used) ? '#3a3142' : DOOR_MAP_COLORS[d.type];
    ctx.fillRect(mapX + d.x * scale, mapY + d.y * scale,
                 Math.max(2.5, d.w * scale), Math.max(2.5, d.h * scale));
  }

  // Items
  (floor.bridges || []).forEach((b, i) => {
    if (gs.bridgeUses[gs.floor][i] <= 0) return;
    ctx.fillStyle = '#8a6a40';
    ctx.fillRect(mapX + b.x * scale, mapY + b.y * scale, b.w * scale, b.h * scale);
  });
  for (const L of (floor.launchers || [])) {
    ctx.fillStyle = L.on ? '#46d674' : '#e8842a';
    ctx.fillRect(mapX + L.x * scale, mapY + L.y * scale, Math.max(3, L.w * scale), Math.max(3, L.h * scale));
  }
  for (const sw of (floor.launcherSwitches || [])) {
    const on = (floor.launchers || []).length > 0 && floor.launchers.every(L => L.on);
    ctx.fillStyle   = on ? '#46d674' : '#e8842a';
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth   = 1;
    const sx = mapX + sw.x * scale, sy = mapY + sw.y * scale;
    const ss = Math.max(3, sw.w * scale);
    ctx.fillRect(sx, sy, ss, ss);
    ctx.strokeRect(sx, sy, ss, ss);
  }
  for (const rp of (floor.ramps || [])) {
    ctx.fillStyle = '#7c8a5a';
    ctx.fillRect(mapX + rp.x * scale, mapY + rp.y * scale, Math.max(3, rp.w * scale), Math.max(3, rp.h * scale));
  }
  for (const p of (floor.pickups || [])) {
    if (gs.collected[gs.floor][p.id]) continue;
    ctx.beginPath();
    ctx.arc(mapX + p.x * scale, mapY + p.y * scale, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#ffce50';
    ctx.fill();
  }

  // Trigger pads
  for (const t of (floor.triggers || [])) {
    const txm = mapX + t.x * scale;
    const tym = mapY + t.y * scale;
    const trm = Math.max(4, t.r * scale);
    const active = !!gs.activated[gs.floor][t.id];
    ctx.beginPath();
    ctx.arc(txm, tym, trm, 0, Math.PI * 2);
    ctx.fillStyle = active ? 'rgba(90,220,130,0.9)' : 'rgba(20,30,40,0.9)';
    ctx.fill();
    ctx.strokeStyle = active ? 'rgba(140,255,180,1)' : 'rgba(90,200,255,0.8)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    if (floor.requireSequence) {
      ctx.fillStyle    = active ? 'rgba(10,30,15,0.9)' : 'rgba(255,255,255,0.7)';
      ctx.font         = `bold ${Math.max(8, Math.round(trm * 1.1))}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(t.order + 1), txm, tym + 0.5);
    }
  }

  // Hole
  if (floor.hole) {
    const hx = mapX + floor.hole.x * scale;
    const hy = mapY + floor.hole.y * scale;
    const hr = Math.max(5, floor.hole.r * scale);
    ctx.beginPath();
    ctx.arc(hx, hy, hr, 0, Math.PI * 2);
    ctx.fillStyle = '#050403';
    ctx.fill();
    ctx.strokeStyle = unlocked ? 'rgba(255,200,60,0.7)' : 'rgba(255,80,70,0.85)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
  }

  // View indicator — approximate visible region, rotated with the camera
  ctx.save();
  ctx.translate(mapX + gs.camera.x * scale, mapY + gs.camera.y * scale);
  ctx.rotate(-viewAngle());
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth   = 1;
  ctx.setLineDash([3, 3]);
  const vw = W * scale, vh = (H / ISO_Y) * scale;
  ctx.strokeRect(-vw / 2, -vh / 2, vw, vh);
  ctx.setLineDash([]);
  ctx.restore();

  // Compass — which way the camera is facing (N = world up)
  ctx.save();
  ctx.translate(mapX + mapW - 18, mapY + 18);
  ctx.rotate(viewAngle());
  ctx.fillStyle = 'rgba(255,160,60,0.9)';
  ctx.beginPath();
  ctx.moveTo(0, -10); ctx.lineTo(5, 6); ctx.lineTo(0, 2); ctx.lineTo(-5, 6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Ball marker (pulsing ring + dot)
  const bx  = mapX + gs.ball.x * scale;
  const by  = mapY + gs.ball.y * scale;
  const br  = Math.max(5, CONFIG.ballRadius * scale);
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 280);
  ctx.beginPath();
  ctx.arc(bx, by, br + pulse * 4, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,255,255,${0.28 * pulse})`;
  ctx.lineWidth   = 1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(bx, by, br, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // Start position crosshair
  ctx.strokeStyle = 'rgba(100,220,100,0.4)';
  ctx.lineWidth   = 1;
  const sx = mapX + floor.startX * scale;
  const sy = mapY + floor.startY * scale;
  ctx.beginPath();
  ctx.moveTo(sx - 5, sy); ctx.lineTo(sx + 5, sy);
  ctx.moveTo(sx, sy - 5); ctx.lineTo(sx, sy + 5);
  ctx.stroke();

  // Title
  ctx.fillStyle    = 'rgba(255,255,255,0.88)';
  ctx.font         = '600 13px "Helvetica Neue", Helvetica, Arial, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(floor.label.toUpperCase() + ' — MAP', W / 2, PAD + HDR / 2);

  // Legend row
  const legY = mapY + mapH + LEG / 2;
  ctx.font         = '11px "Helvetica Neue", Helvetica, Arial, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign    = 'left';
  let lx = mapX + 4;

  // You (ball)
  ctx.beginPath();
  ctx.arc(lx + 5, legY, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('You', lx + 14, legY);
  lx += 52;

  // Start
  ctx.strokeStyle = 'rgba(100,220,100,0.6)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(lx, legY); ctx.lineTo(lx + 10, legY);
  ctx.moveTo(lx + 5, legY - 5); ctx.lineTo(lx + 5, legY + 5);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('Start', lx + 14, legY);
  lx += 58;

  if (floor.triggers && floor.triggers.length) {
    ctx.beginPath();
    ctx.arc(lx + 5, legY, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(20,30,40,0.9)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(90,200,255,0.8)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText('Trigger', lx + 14, legY);
    lx += 68;
  }

  if (floor.hole) {
    ctx.beginPath();
    ctx.arc(lx + 5, legY, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#050403';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,200,60,0.8)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText('Hole', lx + 14, legY);
    lx += 52;
  }

  const hasHazard = floor.tiles && Object.keys(floor.tiles).some(k => floor.tiles[k] === 'lava' || floor.tiles[k] === 'pit');
  if (hasHazard) {
    ctx.fillStyle = '#d04812';
    ctx.fillRect(lx, legY - 5, 5, 10);
    ctx.fillStyle = '#000000';
    ctx.fillRect(lx + 5, legY - 5, 5, 10);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText('Hazard', lx + 14, legY);
    lx += 70;
  }

  if (floor.door) {
    ctx.fillStyle = '#ffcc22';
    ctx.fillRect(lx, legY - 5, 8, 10);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText('Exit', lx + 12, legY);
  }

  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

function drawFadeOverlay() {
  let alpha = 0;
  if (gs.transitioning) alpha = gs.transAlpha;
  if (gs.ended)         alpha = Math.max(alpha, gs.endFade);
  if (alpha <= 0) return;
  ctx.fillStyle = `rgba(0,0,0,${alpha.toFixed(3)})`;
  ctx.fillRect(0, 0, W, H);
}

// ── UI helpers ───────────────────────────────────────────────────
function updateFloorLabel() {
  const f = floors[gs.floor];
  let txt = f.label;
  if (f.triggers && f.triggers.length) {
    const n = f.requireSequence ? gs.seqProgress : activatedCount(gs.floor);
    if (exitUnlocked(gs.floor)) {
      txt += '  ·  UNLOCKED';
    } else {
      txt += `  ·  ${n}/${f.triggers.length}` + (f.requireSequence ? ' IN ORDER' : ' TRIGGERS');
    }
  }
  document.getElementById('floor-label').textContent = txt;
}

let hintVisible = true;
function hideHint() {
  if (!hintVisible) return;
  hintVisible = false;
  const el = document.getElementById('hint');
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 1100); }
}

// ── Resize ───────────────────────────────────────────────────────
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
  resizeControls();
  buildFloors();
  if (gs) {
    // Clamp ball inside new floor, snap camera
    const f = floors[gs.floor];
    const wt = CONFIG.wallThickness, r = CONFIG.ballRadius;
    gs.ball.x = Math.max(wt + r, Math.min(gs.ball.x, f.width  - wt - r));
    gs.ball.y = Math.max(wt + r, Math.min(gs.ball.y, f.height - wt - r));
    snapCamera();
    updateFloorLabel();
  }
}

// ── Main loop ────────────────────────────────────────────────────
function loop(now) {
  requestAnimationFrame(loop);
  if (!gs) return;

  const dt = lastTime ? Math.min((now - lastTime) / 1000, 0.05) : 0;
  lastTime = now;

  // Animate map overlay in/out
  const MAP_SPEED = 5;
  if (gs.mapOpen)       gs.mapAlpha = Math.min(1, gs.mapAlpha + MAP_SPEED * dt);
  else                  gs.mapAlpha = Math.max(0, gs.mapAlpha - MAP_SPEED * dt);

  updateBounceEffects(dt);
  updateTransition(dt);
  updateEndFade(dt);
  updateView(dt);
  updateDeath(dt);
  updateDeathFx(dt);
  if (!gs.ended) updatePhysics(dt);
  if (!gs.mapOpen && !gs.dying) updateCamera(dt);
  updateTimerLabel();

  // ── Render
  const floor = floors[gs.floor];

  // bg
  ctx.fillStyle = floor.bgColor;
  ctx.fillRect(0, 0, W, H);

  drawFloor(floor);   // ground, features, walls and ball, depth-sorted
  drawDeathFx();

  // Surface debug label
  if (CONFIG.showSurfaceDebug && gs.surface !== undefined) {
    const SURF_LABELS  = { floor: 'Floor', platform: 'Platform', mud1: 'Thin Mud', mud2: 'Mud', mud3: 'Deep Mud', ice: 'Ice', mover: 'Moving platform', bridge: 'Wooden bridge' };
    const SURF_COLORS  = { floor: 'rgba(255,255,255,0.42)', platform: '#88ddff', mud1: '#d9b88a', mud2: '#c9a36a', mud3: '#a87f48', ice: '#bfe6f5', mover: '#aaaabe', bridge: '#d8b070' };
    const txt   = SURF_LABELS[gs.surface] || gs.surface;
    const color = SURF_COLORS[gs.surface] || 'white';
    ctx.save();
    ctx.font         = 'bold 10px "Helvetica Neue", Helvetica, Arial, sans-serif';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    const tw = ctx.measureText(txt).width + 22;
    const lx = W / 2, ly = 96;   // below the floor label and run timer
    ctx.fillStyle = 'rgba(0,0,0,0.48)';
    ctx.fillRect(lx - tw / 2, ly - 11, tw, 22);
    ctx.fillStyle = color;
    ctx.fillText(txt, lx, ly);
    ctx.restore();
  }

  drawJoystickHUD();
  drawPauseHUD();
  if (gs.mapAlpha > 0) drawMapOverlay(gs.mapAlpha);
  drawFadeOverlay();
}

// ── Settings panel ───────────────────────────────────────────────
function initAdmin() {
  // Migrate the old tmSens key (joy/tilt only) into tmSettings
  let saved = JSON.parse(localStorage.getItem('tmSettings') || 'null');
  if (!saved) {
    const old = JSON.parse(localStorage.getItem('tmSens') || '{}');
    saved = { joy: old.joy, tilt: old.tilt };
    localStorage.removeItem('tmSens');
  }
  // Code defaults for the advanced feel values, captured before saved
  // overrides land, so Reset Advanced restores them
  const advKeys = ['acceleration', 'maxSpeed', 'friction', 'idleFriction', 'brakeBoost',
                   'joyResponse', 'joyDiagSpeed', 'joyDiagResponse'];
  const advDefaults = {};
  for (const k of advKeys) advDefaults[k] = CONFIG[k];

  if (saved.joy      != null) CONFIG.joystickSensitivity = saved.joy;
  if (saved.tilt     != null) CONFIG.tiltSensitivity     = saved.tilt;
  if (saved.bounce   != null) CONFIG.wallBounce          = saved.bounce;
  if (saved.sfx      != null) CONFIG.sfxVolume           = saved.sfx;
  if (saved.music    != null) CONFIG.musicVolume         = saved.music;
  if (saved.accel    != null) CONFIG.acceleration        = saved.accel;
  if (saved.max      != null) CONFIG.maxSpeed            = saved.max;
  if (saved.fric     != null) CONFIG.friction            = saved.fric;
  if (saved.idleFric != null) CONFIG.idleFriction        = saved.idleFric;
  if (saved.brake    != null) CONFIG.brakeBoost          = saved.brake;
  if (saved.snap8    != null) CONFIG.joystickSnap8       = saved.snap8;
  if (saved.joyResp  != null) CONFIG.joyResponse         = saved.joyResp;
  if (saved.diagSpd  != null) CONFIG.joyDiagSpeed        = saved.diagSpd;
  if (saved.diagResp   != null) CONFIG.joyDiagResponse  = saved.diagResp;
  if (saved.magnetDur  != null) CONFIG.magnetDuration   = saved.magnetDur;

  function save() {
    localStorage.setItem('tmSettings', JSON.stringify({
      joy:      CONFIG.joystickSensitivity,
      tilt:     CONFIG.tiltSensitivity,
      bounce:   CONFIG.wallBounce,
      sfx:      CONFIG.sfxVolume,
      music:    CONFIG.musicVolume,
      accel:    CONFIG.acceleration,
      max:      CONFIG.maxSpeed,
      fric:     CONFIG.friction,
      idleFric: CONFIG.idleFriction,
      brake:    CONFIG.brakeBoost,
      snap8:    CONFIG.joystickSnap8,
      joyResp:  CONFIG.joyResponse,
      diagSpd:  CONFIG.joyDiagSpeed,
      diagResp:  CONFIG.joyDiagResponse,
      magnetDur: CONFIG.magnetDuration,
    }));
  }

  // [slider id, value label id, CONFIG key, decimals shown]
  const sliders = [
    ['joy-sens-sl',   'joy-sens-val',   'joystickSensitivity', 1],
    ['tilt-sens-sl',  'tilt-sens-val',  'tiltSensitivity',     1],
    ['bounce-sl',     'bounce-val',     'wallBounce',          2],
    ['sfx-sl',        'sfx-val',        'sfxVolume',           2],
    ['music-sl',      'music-val',      'musicVolume',         2],
    ['accel-sl',      'accel-val',      'acceleration',        0],
    ['max-speed-sl',  'max-speed-val',  'maxSpeed',            0],
    ['fric-sl',       'fric-val',       'friction',            3],
    ['idle-fric-sl',  'idle-fric-val',  'idleFriction',        3],
    ['brake-sl',      'brake-val',      'brakeBoost',          1],
    ['joy-resp-sl',   'joy-resp-val',   'joyResponse',         1],
    ['diag-speed-sl', 'diag-speed-val', 'joyDiagSpeed',        2],
    ['diag-resp-sl',  'diag-resp-val',  'joyDiagResponse',     1],
    ['magnet-dur-sl', 'magnet-dur-val', 'magnetDuration',      0],
  ];
  function refreshSliders() {
    for (const [slId, valId, key, dec] of sliders) {
      document.getElementById(slId).value = CONFIG[key];
      document.getElementById(valId).textContent = CONFIG[key].toFixed(dec);
    }
  }
  refreshSliders();
  for (const [slId, valId, key, dec] of sliders) {
    const sl  = document.getElementById(slId);
    const val = document.getElementById(valId);
    sl.addEventListener('input', () => {
      CONFIG[key] = parseFloat(sl.value);
      val.textContent = CONFIG[key].toFixed(dec);
      save();
    });
  }

  const snap8cb = document.getElementById('snap8-cb');
  snap8cb.checked = CONFIG.joystickSnap8;
  snap8cb.addEventListener('change', () => {
    CONFIG.joystickSnap8 = snap8cb.checked;
    save();
  });

  document.getElementById('adv-toggle').addEventListener('click', () => {
    document.getElementById('adv-toggle').classList.toggle('open');
    document.getElementById('adv-section').classList.toggle('open');
  });
  document.getElementById('adv-reset').addEventListener('click', () => {
    for (const k of advKeys) CONFIG[k] = advDefaults[k];
    refreshSliders();
    save();
  });

  document.getElementById('admin-btn').addEventListener('click', toggleAdmin);
  document.getElementById('admin-done').addEventListener('click', toggleAdmin);
}

function toggleAdmin() {
  const panel = document.getElementById('admin-panel');
  const btn   = document.getElementById('admin-btn');
  const open  = panel.style.display !== 'block';
  panel.style.display = open ? 'block' : 'none';
  btn.classList.toggle('open', open);
  if (gs) gs.paused = open;
}

// ── Bootstrap ────────────────────────────────────────────────────
window.addEventListener('resize', resize);

document.getElementById('reset-btn').addEventListener('click', resetGame);
document.getElementById('play-again-btn').addEventListener('click', resetGame);
document.getElementById('tilt-btn').addEventListener('click', enableTilt);
document.getElementById('map-btn').addEventListener('click', toggleMap);
document.getElementById('rot-left-btn').addEventListener('click', () => rotateView(-1));
document.getElementById('rot-right-btn').addEventListener('click', () => rotateView(1));
document.getElementById('death-restart').addEventListener('click', restartFloor);
document.getElementById('death-newgame').addEventListener('click', () => { hideDeathUI(); resetGame(); });
document.getElementById('death-quit').addEventListener('click', () => {
  hideDeathUI();
  document.getElementById('title-screen').style.display = 'flex';
});
document.getElementById('title-play').addEventListener('click', () => {
  document.getElementById('title-screen').style.display = 'none';
  resetGame();
});

resize();
initAdmin();
gs = createGS();
updateFloorLabel();
snapCamera();
requestAnimationFrame(loop);
</script>
